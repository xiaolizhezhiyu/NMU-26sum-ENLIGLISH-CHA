<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>过单词 · 期末冲刺</title>
<style>
  :root{
    --ink:#14110f; --paper:#f3ede1; --card:#fbf8f1; --line:#e3d9c6;
    --accent:#c4502d;          /* 朱砂 */
    --accent-2:#2f6f5e;        /* 对的颜色 */
    --gold:#b8893a;
    --muted:#8a7e6c;
    --shadow:0 1px 0 #fff inset, 0 18px 40px -24px rgba(40,30,15,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #f7f1e6 0%, var(--paper) 55%, #ece2cf 100%);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
    display:flex;flex-direction:column;min-height:100%;
    overscroll-behavior:none;
  }
  /* 顶栏 */
  header{
    padding:14px 18px 10px; display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--line);
  }
  .brand{font-weight:800;letter-spacing:.5px;font-size:18px;display:flex;align-items:baseline;gap:8px}
  .brand .zh{font-size:20px}
  .brand .en{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .seal{
    margin-left:auto;width:34px;height:34px;border-radius:7px;
    border:1.5px solid var(--accent);color:var(--accent);
    display:grid;place-items:center;font-weight:800;font-size:15px;
    transform:rotate(-4deg);font-family:"Songti SC","SimSun",serif;
  }
  /* 选库 */
  .decks{display:flex;gap:8px;padding:12px 14px 0;flex-wrap:wrap}
  .deck{
    flex:1 1 0;min-width:96px;cursor:pointer;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:11px 13px;box-shadow:var(--shadow);transition:.16s;
    display:flex;flex-direction:column;gap:3px;
  }
  .deck:active{transform:scale(.98)}
  .deck.on{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent),var(--shadow)}
  .deck .t{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
  .deck .n{font-size:12px;color:var(--muted)}
  .deck.wrong .t{color:var(--accent)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  /* 进度 */
  .meta{display:flex;align-items:center;gap:10px;padding:12px 16px 4px;font-size:12px;color:var(--muted)}
  .bar{flex:1;height:6px;border-radius:99px;background:#e6dcc8;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--accent));transition:width .3s}
  .tag{padding:2px 8px;border-radius:99px;background:#efe6d3;color:var(--muted);font-weight:600}
  /* 卡片区 */
  main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:6px 16px 16px;gap:14px;min-height:0}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);padding:26px 22px 22px;position:relative;
  }
  .card::before{
    content:"";position:absolute;inset:6px;border-radius:15px;
    border:1px solid #efe7d6;pointer-events:none;
  }
  .pos-line{display:flex;align-items:center;gap:9px;margin-bottom:6px;flex-wrap:wrap}
  .word{font-size:34px;font-weight:800;line-height:1.18;letter-spacing:.2px;word-break:break-word}
  .ipa{color:var(--muted);font-size:15px;font-style:italic}
  .pos{font-size:12px;color:var(--accent-2);font-weight:700;border:1px solid #cfe0d8;background:#eaf2ee;border-radius:6px;padding:1px 7px}
  .hint{margin-top:6px;color:var(--muted);font-size:12px}
  /* 选项 */
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{
    text-align:left;cursor:pointer;border:1px solid var(--line);background:var(--card);
    border-radius:14px;padding:14px 15px;font-size:16px;color:var(--ink);
    box-shadow:var(--shadow);transition:.13s;display:flex;align-items:center;gap:11px;
  }
  .opt:active{transform:scale(.99)}
  .opt .k{width:22px;height:22px;flex:none;border-radius:6px;border:1px solid var(--line);
    display:grid;place-items:center;font-size:12px;color:var(--muted);font-weight:700}
  .opt.right{border-color:var(--accent-2);background:#e9f3ee;color:#1f4d40}
  .opt.right .k{border-color:var(--accent-2);background:var(--accent-2);color:#fff}
  .opt.wrong{border-color:var(--accent);background:#fbeae5;color:#8c3017}
  .opt.wrong .k{border-color:var(--accent);background:var(--accent);color:#fff}
  .opt[disabled]{cursor:default}
  /* 底部操作 */
  .foot{display:flex;align-items:center;gap:10px;padding:8px 16px 18px}
  .btn{
    border:1px solid var(--line);background:var(--card);border-radius:12px;
    padding:11px 14px;font-size:14px;font-weight:700;cursor:pointer;color:var(--ink);
    box-shadow:var(--shadow);
  }
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--ink);color:#f6efe1;border-color:var(--ink);margin-left:auto}
  .btn.ghost{color:var(--muted)}
  .stat{font-size:12px;color:var(--muted)}
  .stat b{color:var(--accent)}
  /* 空/完成态 */
  .done{text-align:center;padding:34px 18px}
  .done .big{font-size:22px;font-weight:800;margin-bottom:8px}
  .done .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  .toast{
    position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#f6efe1;padding:9px 16px;border-radius:999px;font-size:13px;
    opacity:0;pointer-events:none;transition:.25s;z-index:9;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (min-width:560px){
    body{max-width:480px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line)}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

</div>

HANDBOOK.forEach(w=>{w.ipa=w.ipa||"";w.unit=w.unit||"手册";});

const WRONG_KEY = "vocabDrill.wrong.v1";

/* ===== 错题本存取 ===== */
function loadWrong(){
  try{return JSON.parse(localStorage.getItem(WRONG_KEY)||"{}");}catch(e){return{};}
}
function saveWrong(o){ try{localStorage.setItem(WRONG_KEY,JSON.stringify(o));}catch(e){} }
function wrongList(){
  const o=loadWrong();
  return Object.values(o).sort((a,b)=>b.t-a.t);
}
function addWrong(w){
  const o=loadWrong(); const id=w.deck+"::"+w.en;
  o[id]={en:w.en,ipa:w.ipa,pos:w.pos,zh:w.zh,unit:w.unit,deck:w.deck,t:Date.now(),
         miss:(o[id]?o[id].miss:0)+1};
  saveWrong(o);
}
function removeWrong(w){
  const o=loadWrong(); delete o[w.deck+"::"+w.en]; saveWrong(o);
}

/* ===== 牌库定义 ===== */
function buildDecks(){
  return [
    {id:"course", name:"课内", sub:COURSE.length+" 词", words:COURSE.map(w=>({...w,deck:"course"}))},
    {id:"handbook", name:"复习手册", sub:HANDBOOK.length+" 词", words:HANDBOOK.map(w=>({...w,deck:"handbook"}))},
    {id:"wrong", name:"错题本", sub:"0 词", wrong:true, words:[]},
  ];
}
let DECKS = buildDecks();

/* ===== 状态 ===== */
let curDeck="course", queue=[], idx=0, answered=false, right=0, total=0;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function refreshWrongDeck(){
  const wl=wrongList().map(w=>({...w}));
  const d=DECKS.find(d=>d.id==="wrong");
  d.words=wl; d.sub=wl.length+" 词";
}

function startDeck(id){
  curDeck=id;
  if(id==="wrong") refreshWrongDeck();
  const deck=DECKS.find(d=>d.id===id);
  queue=shuffle(deck.words);
  idx=0;answered=false;right=0;total=0;
  renderDecks();
  document.getElementById("deckName").textContent=deck.name;
  render();
}

/* ===== 渲染牌库选择 ===== */
function renderDecks(){
  refreshWrongDeck();
  const box=document.getElementById("decks");
  box.innerHTML="";
  DECKS.forEach(d=>{
    const el=document.createElement("button");
    el.className="deck"+(d.id===curDeck?" on":"")+(d.wrong?" wrong":"");
    el.innerHTML=`<span class="t">${d.wrong?'<span class="dot"></span>':''}${d.name}</span><span class="n">${d.sub}</span>`;
    el.onclick=()=>startDeck(d.id);
    box.appendChild(el);
  });
}

/* ===== 生成选项：正确释义 + 3 个同库干扰 ===== */
function makeOptions(word){
  const pool = (DECKS.find(d=>d.id===word.deck)||{}).words || COURSE.concat(HANDBOOK);
  const distract = shuffle(pool.filter(w=>w.zh!==word.zh)).slice(0,3).map(w=>w.zh);
  return shuffle([word.zh,...distract]);
}

/* ===== 渲染当前卡片 ===== */
function render(){
  const main=document.getElementById("main");
  const barFill=document.getElementById("barFill");
  const counter=document.getElementById("counter");
  const scoreStat=document.getElementById("scoreStat");
  scoreStat.innerHTML = total? `本轮 <b>${right}</b>/${total} 正确` : "";

  if(queue.length===0){
    counter.textContent="0 / 0"; barFill.style.width="0%";
    const empty = curDeck==="wrong"
      ? `<div class="done"><div class="big">错题本是空的 🎉</div><div class="sub">刷题时答错的词会自动收进这里。先去课内或复习手册练几轮吧。</div></div>`
      : `<div class="done"><div class="big">这个词库没有内容</div></div>`;
    main.innerHTML=empty;
    document.getElementById("nextBtn").style.visibility="hidden";
    return;
  }
  if(idx>=queue.length){
    counter.textContent=`${queue.length} / ${queue.length}`; barFill.style.width="100%";
    const acc = total? Math.round(right/total*100):0;
    main.innerHTML=`<div class="done">
      <div class="big">这一轮过完啦</div>
      <div class="sub">正确率 ${acc}% · 共 ${total} 题${curDeck==="wrong"?'<br>答对的词已移出错题本':''}</div>
      <button class="btn primary" style="margin:0 auto" onclick="startDeck(curDeck)">再来一轮</button>
    </div>`;
    document.getElementById("nextBtn").style.visibility="hidden";
    return;
  }

  document.getElementById("nextBtn").style.visibility="visible";
  const w=queue[idx];
  answered=false;
  counter.textContent=`${idx+1} / ${queue.length}`;
  barFill.style.width=(idx/queue.length*100)+"%";

  const opts=makeOptions(w);
  const keys=["A","B","C","D"];
  main.innerHTML=`
    <div class="card">
      <div class="pos-line">
        ${w.pos?`<span class="pos">${w.pos}</span>`:""}
        ${w.ipa?`<span class="ipa">${w.ipa}</span>`:""}
        <span class="ipa" style="margin-left:auto">${w.unit||""}${w.miss?` · 错过${w.miss}次`:""}</span>
      </div>
      <div class="word">${w.en}</div>
      <div class="hint">选出正确的中文释义</div>
    </div>
    <div class="opts" id="opts">
      ${opts.map((o,i)=>`<button class="opt" data-zh="${encodeURIComponent(o)}">
        <span class="k">${keys[i]}</span><span>${o}</span></button>`).join("")}
    </div>`;

  document.querySelectorAll("#opts .opt").forEach(btn=>{
    btn.onclick=()=>choose(btn,w);
  });
}

/* ===== 作答 ===== */
function choose(btn,w){
  if(answered)return;answered=true;total++;
  const picked=decodeURIComponent(btn.dataset.zh);
  const correct = picked===w.zh;
  document.querySelectorAll("#opts .opt").forEach(b=>{
    b.disabled=true;
    const zh=decodeURIComponent(b.dataset.zh);
    if(zh===w.zh) b.classList.add("right");
    else if(b===btn) b.classList.add("wrong");
  });
  if(correct){
    right++;
    if(curDeck==="wrong"){ removeWrong(w); toast("答对，移出错题本"); }
  }else{
    addWrong(w);
    toast(curDeck==="wrong"?"再记一次":"已加入错题本");
  }
  renderDecks();
  // 答对自动下一题（稍作停顿看反馈）
  setTimeout(()=>{ if(answered && correct) next(); }, 650);
}

function next(){
  if(idx<queue.length){ idx++; render(); }
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),1100);
}

document.getElementById("nextBtn").onclick=()=>{
  if(!answered && queue.length && idx<queue.length){ // 跳过=算作未掌握？这里仅跳过不计错
    toast("已跳过");
  }
  next();
};
document.getElementById("restartBtn").onclick=()=>startDeck(curDeck);

/* ===== 初始化 ===== */
renderDecks();
startDeck("course");
</script>
