, when Allied forces invaded Normandy.","zh":"进攻发起日登陆是在1944年6月6日，当天盟军进攻诺曼底。"},{"en":"She felt that the guard had invaded her privacy when he searched her bag.","zh":"她觉得警卫搜查她的包是侵犯了她的隐私。"}],"forms":["base","past"]},{"id":199,"word":"mystery","gloss":"神秘的事","unit":"B2U6","examples":[{"en":"How the massive stones were brought here from hundreds of miles away remains a mystery.","zh":"这些巨石是怎么从数百英里以外搬过来的，至今还是个谜。"},{"en":"The mystery was solved when the police discovered the murder weapon.","zh":"警察发现了谋杀的凶器，谜就解开了。"}],"forms":["base"]},{"id":200,"word":"resemble","gloss":"与…相似","unit":"B2U6","examples":[],"forms":["base"]},{"id":201,"word":"resemblance","gloss":"相似（之处）","unit":"B2U6","examples":[{"en":"She found Jack's room to resemble more a study than a youth's bedroom.","zh":"她觉得杰克的房间更像一个书房而不像一个年轻人的寝室。"},{"en":"The two of them resemble each other closely enough to be sisters.","zh":"她俩非常相像，简直和姐妹一样。"},{"en":"He doesn't look exactly like his father, but there is some resemblance.","zh":"他不完全像他爸，但他们俩长相有相似之处。"}],"forms":["base"]},{"id":202,"word":"descend","gloss":"起源于；下降，下来","unit":"B2U6","examples":[{"en":"Humans are thought to have descended from ape-like creatures.","zh":"人类被认为是起源于类猩猩动物。"},{"en":"He descends from an old merchant family.","zh":"他是一个古老的商人家族的后代。"}],"forms":["base","past","s"]},{"id":203,"word":"come up with","gloss":"想出（计划、回答等）；提出","unit":"B2U6","examples":[{"en":"She has come up with some amazing ideas to cut down cost.","zh":"她提出了一些巧妙的削减成本的建议。"},{"en":"They came up with a plan to increase productivity.","zh":"他们提出了一个提高生产力的计划。"}],"forms":["base"]},{"id":204,"word":"establish","gloss":"建立，确立","unit":"B2U6","examples":[{"en":"After they took control of the town, the first thing they did was to establish law and order.","zh":"控制了该城市后，他们做的第一件事就是建立法律和秩序。"},{"en":"Being a career diplomat, he spent a good part of his life trying to establish friendly relations between China and other countries.","zh":"作为一名职业外交家，他把一生的许多时间都用于努力建立中国和其他国家间的友好关系。"}],"forms":["base"]},{"id":205,"word":"slip","gloss":"悄悄地走","unit":"B2U6","examples":[{"en":"We managed to slip away unnoticed.","zh":"我们悄悄地走开了，没人注意到。"},{"en":"Time slipped by.","zh":"时间悄悄地流逝了。"},{"en":"The store will close in five minutes. Please pass the information on to the next in line.","zh":"五分钟后商店就要关门了，请把这消息传给排在你后面的人。"},{"en":"That's good news. I will pass it on to all my classmates.","zh":"这是好消息，我会传给全班同学的。"},{"en":"If a company spends a lot on advertising, it will pass the higher cost on to its customers.","zh":"一个公司在广告上花许多钱，必然会把高成本转嫁给客户。"}],"forms":["base","past"]},{"id":206,"word":"replace","gloss":"取代","unit":"B2U6","examples":[{"en":"The factory replaced most of its workers with robots.","zh":"工厂用机器人代替了大部分工人。"},{"en":"Tourism has replaced agriculture as the nation's main industry.","zh":"旅游业取代了农业，成了这个国家的主要产业。"}],"forms":["base","past"]},{"id":207,"word":"modify","gloss":"修改，更改","unit":"B2U6","examples":[{"en":"The original plan was too ambitious and costly. The modified one looks more reasonable.","zh":"原计划太激进也太花钱，经修订后的计划更趋合理。"},{"en":"The school has decided to modify its existing employment policy.","zh":"学校决定修改现有的聘用政策。"}],"forms":["base","past"]},{"id":208,"word":"spring from","gloss":"源于","unit":"B2U6","examples":[{"en":"His idea of writing the novel sprang from a news report he had read.","zh":"他读了一篇新闻报道后产生了写这本小说的想法。"},{"en":"His desire for money springs from a sense of financial insecurity.","zh":"他对钱的欲望源于经济上的不安全感。"}],"forms":["base"]},{"id":209,"word":"source","gloss":"源头，来源","unit":"B2U6","examples":[{"en":"Fruit is a good source of Vitamin C.","zh":"水果是维生素C的很好的来源。"},{"en":"Writing is not his only source of income.","zh":"写作不是他收入的唯一来源。"},{"en":"The journalist refused to reveal his sources of information.","zh":"记者拒绝透露他的消息来源。"}],"forms":["base","s"]},{"id":210,"word":"out of control","gloss":"失去控制，不受约束","unit":"B2U6","examples":[{"en":"To prevent costs from getting out of control is the top priority of the company right now.","zh":"公司目前的头等大事就是防止成本失控。"},{"en":"His car went out of control and hit a big tree.","zh":"他的车失控了，撞到一棵大树上。"},{"en":"His advice is good. But it is hard to put into practice.","zh":"他的建议很好，但是难以实施。"},{"en":"I will try to put the new technique you showed me into practice.","zh":"我将把你展示给我的新技术用于实践。"}],"forms":["base"]},{"id":211,"word":"represent","gloss":"代表；象征","unit":"B2U6","examples":[{"en":"The new car model is more environment-friendly and represents a step in the right direction on the part of its manufacturer.","zh":"这新款汽车更环保，代表了制造商走出的正确的一步。"},{"en":"The dove represents peace in many religious and political artworks.","zh":"在许多有宗教和政治内容的艺术作品中，鸽子代表和平。"}],"forms":["base","s"]},{"id":212,"word":"individual","gloss":"个人，个体","unit":"B2U6","examples":[{"en":"How could a single individual have achieved all this?","zh":"单独一个人怎么会取得这么大的成就呢？"},{"en":"Are you the individual who wants to meet me?","zh":"你就是那个想要见我的人吗？"},{"en":"We develop our own individual style of writing.","zh":"我们各人都有各自的写作风格。"},{"en":"We try to meet the individual needs of students.","zh":"我们试图满足学生的个人需求。"}],"forms":["base"]},{"id":213,"word":"strike out","gloss":"创造，设计；启程","unit":"B2U6","examples":[{"en":"They at once struck out a new plan, and soon agreed that it was by far the best of all.","zh":"他们立刻想出了新计划，并且很快就认同这是目前为止最好的计划。"},{"en":"After hatching, the baby turtles struck out toward the ocean.","zh":"小海龟孵出来后，就各自爬向大海了。"}],"forms":["base"]},{"id":214,"word":"nourish","gloss":"滋养，培育","unit":"B2U6","examples":[{"en":"The longer I had to postpone my trip to San Francisco, the more eagerly I wanted to go. Desires are nourished by delays.","zh":"去旧金山的旅程越往后推，我就越急着要去。拖延滋长欲望。"},{"en":"He has long nourished an ambition to bring the show to Broadway.","zh":"他早就怀抱雄心壮志，要把这场演出推向百老汇。"}],"forms":["base","past"]},{"id":215,"word":"principle","gloss":"原则；主义","unit":"B2U6","examples":[{"en":"He is a man of principle.","zh":"他是有原则的人。"},{"en":"The organization works on the principle that all members have the same rights.","zh":"这组织的运作原则是所有成员同权。"}],"forms":["base"]},{"id":216,"word":"spring up","gloss":"涌现","unit":"B2U6","examples":[{"en":"Thousands of new businesses have sprung up in this town over the past 20 years.","zh":"过去二十年中这个城市里有成千上万的新商户开张。"},{"en":"A new issue sprang up at yesterday's meeting of the school board.","zh":"昨天校董事会会议上冒出了新问题。"}],"forms":["base"]},{"id":217,"word":"preserve","gloss":"独占的地区或范围；禁猎地","unit":"B2U6","examples":[{"en":"We went to a wildlife preserve and saw many strange animals.","zh":"我们去了一个野生动物保护区，看到不少新奇的动物。"},{"en":"The civil service seems to have become the preserve of the educated middle class.","zh":"公务员这个行业似乎已成为受过教育的中产阶级的专属领地。"},{"en":"These laws are intended to help preserve our natural resources.","zh":"这些法律旨在保护我们的自然资源。"},{"en":"The city is spending lots of money on preserving these ancient buildings.","zh":"这座城市正在花大钱保护古建筑。"}],"forms":["base","ing"]},{"id":218,"word":"intellectual","gloss":"智力的","unit":"B2U6","examples":[{"en":"He concentrates too much on his books and neglects the social and intellectual life on campus.","zh":"他太专注于书本，忽略了校园里的社交和思想活动。"},{"en":"Little is known about the boy's intellectual pursuits.","zh":"人们对这男孩思想上的探求所知甚少。"}],"forms":["base"]}];
const CLOZES=[{"id":0,"wordId":0,"word":"in a row","gloss":"连续地","unit":"B1U6","sentence":"I felt a little bit tired after flying two days ______, but my tiredness was totally replaced by excitement at seeing the splendid view.","answer":"in a row","full":"I felt a little bit tired after flying two days in a row, but my tiredness was totally replaced by excitement at seeing the splendid view.","zh":"连续两天的飞行后我有一点累，但是一见到这壮观的景色，马上兴奋不已，累意全消。"},{"id":1,"wordId":0,"word":"in a row","gloss":"连续地","unit":"B1U6","sentence":"You lost eight points ______ at the beginning of the match. Could you talk about how nervous you were?","answer":"in a row","full":"You lost eight points in a row at the beginning of the match. Could you talk about how nervous you were?","zh":"比赛开始的时候，你连丢8分。你说下当时有多紧张？"},{"id":2,"wordId":1,"word":"doze off","gloss":"打瞌睡，打盹儿","unit":"B1U6","sentence":"The office was so hot I nearly ______ at my desk.","answer":"dozed off","full":"The office was so hot I nearly dozed off at my desk.","zh":"办公室里很热，我差点趴在办公桌上睡着了。"},{"id":3,"wordId":1,"word":"doze off","gloss":"打瞌睡，打盹儿","unit":"B1U6","sentence":"That old man settled himself down comfortably in an armchair in front of the door and began to ______.","answer":"doze off","full":"That old man settled himself down comfortably in an armchair in front of the door and began to doze off.","zh":"老人在门前一张扶手椅上舒服地坐了下来，开始在那儿打盹。"},{"id":4,"wordId":2,"word":"approve","gloss":"赞成；同意；批准","unit":"B1U6","sentence":"You may not ______ of what he did, but he's still your brother.","answer":"approve","full":"You may not approve of what he did, but he's still your brother.","zh":"也许你不赞成他的所作所为，但是他还是你的兄弟。"},{"id":5,"wordId":2,"word":"approve","gloss":"赞成；同意；批准","unit":"B1U6","sentence":"It's very difficult to say no to you as you can imagine, but I am not in a position to ______ your proposal.","answer":"approve","full":"It's very difficult to say no to you as you can imagine, but I am not in a position to approve your proposal.","zh":"你能想象，对你说不十分困难，但我的职责有限，无法批准你的提议。"},{"id":6,"wordId":3,"word":"strain","gloss":"使紧张；绷紧","unit":"B1U6","sentence":"The current trade dispute has ______ relations between the two countries.","answer":"strained","full":"The current trade dispute has strained relations between the two countries.","zh":"目前的贸易争端使两国关系紧张起来。"},{"id":7,"wordId":3,"word":"strain","gloss":"使紧张；绷紧","unit":"B1U6","sentence":"I would welcome some help but don't ______ yourself!","answer":"strain","full":"I would welcome some help but don't strain yourself!","zh":"我倒是盼着有人来帮忙，只是别累坏了你自己！"},{"id":8,"wordId":3,"word":"strain","gloss":"使紧张；绷紧","unit":"B1U6","sentence":"The sudden influx of visitors is ______ hotels in the town to the limit.","answer":"straining","full":"The sudden influx of visitors is straining hotels in the town to the limit.","zh":"游客突然涌入，城里的旅馆全都爆满。"},{"id":9,"wordId":4,"word":"mess","gloss":"脏乱状态","unit":"B1U6","sentence":"He always makes a terrible ______ when he's cooking.","answer":"mess","full":"He always makes a terrible mess when he's cooking.","zh":"他做饭时总是把东西弄得乱七八糟的。"},{"id":10,"wordId":4,"word":"mess","gloss":"脏乱状态","unit":"B1U6","sentence":"David's house is always in a ______.","answer":"mess","full":"David's house is always in a mess.","zh":"大卫的房子总是又脏又乱。"},{"id":11,"wordId":4,"word":"mess","gloss":"脏乱状态","unit":"B1U6","sentence":"Only the best of friends will stay after the party's over to help clean up the ______.","answer":"mess","full":"Only the best of friends will stay after the party's over to help clean up the mess.","zh":"只有最好的朋友们会在派对结束后留下帮忙清理烂摊子。"},{"id":12,"wordId":5,"word":"foundation","gloss":"基础；基本原理","unit":"B1U6","sentence":"All theories should be built on a ______ of factual knowledge.","answer":"foundation","full":"All theories should be built on a foundation of factual knowledge.","zh":"所有理论都应当有事实根据。"},{"id":13,"wordId":5,"word":"foundation","gloss":"基础；基本原理","unit":"B1U6","sentence":"The company sees technology and talented personnel as the ______ of its deve rces.","answer":"preserve","full":"These laws are intended to help preserve our natural resources.","zh":"这些法律旨在保护我们的自然资源。"},{"id":432,"wordId":217,"word":"preserve","gloss":"独占的地区或范围；禁猎地","unit":"B2U6","sentence":"The city is spending lots of money on ______ these ancient buildings.","answer":"preserving","full":"The city is spending lots of money on preserving these ancient buildings.","zh":"这座城市正在花大钱保护古建筑。"},{"id":433,"wordId":218,"word":"intellectual","gloss":"智力的","unit":"B2U6","sentence":"He concentrates too much on his books and neglects the social and ______ life on campus.","answer":"intellectual","full":"He concentrates too much on his books and neglects the social and intellectual life on campus.","zh":"他太专注于书本，忽略了校园里的社交和思想活动。"},{"id":434,"wordId":218,"word":"intellectual","gloss":"智力的","unit":"B2U6","sentence":"Little is known about the boy's ______ pursuits.","answer":"intellectual","full":"Little is known about the boy's intellectual pursuits.","zh":"人们对这男孩思想上的探求所知甚少。"}];

(function(){

});

/* ---------- storage ---------- */

/* ---------- helpers ---------- */
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a;};
const pick=(a,n)=>shuffle(a).slice(0,n);
function fillFull(c){ // bold the answer inside the full sentence
  const re=new RegExp("("+c.answer.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","i");
  return c.full.replace(re,"<em>$1</em>");
}
function sentHTML(c){return c.sentence.replace("______","<span class='blank'>______</span>");}
const esc=s=>String(s).replace(/"/g,"&quot;");
/* ---------- English inflection engine ---------- */
const IRREG={ // base -> {past, pp, ing(optional)}
  be:["was","been"],have:["had","had"],do:["did","done"],go:["went","gone"],
  get:["got","got"],make:["made","made"],take:["took","taken"],come:["came","come"],
  see:["saw","seen"],know:["knew","known"],give:["gave","given"],find:["found","found"],
  think:["thought","thought"],tell:["told","told"],become:["became","become"],
  leave:["left","left"],feel:["felt","felt"],bring:["brought","brought"],
  begin:["began","begun"],keep:["kept","kept"],hold:["held","held"],write:["wrote","written"],
  stand:["stood","stood"],hear:["heard","heard"],let:["let","let"],mean:["meant","meant"],
  set:["set","set"],meet:["met","met"],run:["ran","run"],pay:["paid","paid"],
  sit:["sat","sat"],speak:["spoke","spoken"],lie:["lay","lain"],lead:["led","led"],
  read:["read","read"],grow:["grew","grown"],lose:["lost","lost"],fall:["fell","fallen"],
  send:["sent","sent"],build:["built","built"],spend:["spent","spent"],
  catch:["caught","caught"],fight:["fought","fought"],teach:["taught","taught"],
  buy:["bought","bought"],wear:["wore","worn"],break:["broke","broken"],
  choose:["chose","chosen"],drive:["drove","driven"],rise:["rose","risen"],
  draw:["drew","drawn"],deal:["dealt","dealt"]
};
const VOWEL="aeiou";
function dbl(b){ // double final consonant? CVC, final syllable stressed (heuristic)
  if(b.length<3)return false;
  const a=b[b.length-3],v=b[b.length-2],c=b[b.length-1];
  if(VOWEL.includes(a)||!VOWEL.includes(v)||VOWEL.includes(c)||"wxy".includes(c))return false;
  // skip common unstressed final-syllable endings (wander, visit, open, offer, travel...)
  if(/(er|en|on|it|el|ol|om|or|ow|et|in|id)$/.test(b)&&b.length>4)return false;
  return true;
}
function ing(b){
  if(b.endsWith("ie"))return b.slice(0,-2)+"ying";
  if(b.endsWith("e")&&!b.endsWith("ee")&&b.length>2)return b.slice(0,-1)+"ing";
  if(dbl(b))return b+b[b.length-1]+"ing";
  return b+"ing";
}
function past(b){
  if(IRREG[b])return IRREG[b][0];
  if(b.endsWith("e"))return b+"d";
  if(b.endsWith("y")&&!VOWEL.includes(b[b.length-2]))return b.slice(0,-1)+"ied";
  if(dbl(b))return b+b[b.length-1]+"ed";
  return b+"ed";
}
function third(b){
  if(/(s|x|z|ch|sh)$/.test(b))return b+"es";
  if(b.endsWith("y")&&!VOWEL.includes(b[b.length-2]))return b.slice(0,-1)+"ies";
  if(b.endsWith("o"))return b+"es";
  return b+"s";
}
function plural(b){return third(b);} // same rules for noun plural
// produce a surface form of `base` matching grammatical `form`
function inflect(base,form){
  const toks=base.split(" ");
  const lastIdx=toks.length-1;
  let last=toks[lastIdx];
  // only inflect alphabetic last token
  if(!/^[a-zA-Z]+$/.test(last))return base;
  const lw=last.toLowerCase();
  let out=last;
  if(form==="ing")out=ing(lw);
  else if(form==="past")out=past(lw);
  else if(form==="s")out=third(lw);
  else out=lw;
  // preserve capitalization of original token
  if(last[0]===last[0].toUpperCase())out=out[0].toUpperCase()+out.slice(1);
  toks[lastIdx]=out;
  return toks.join(" ");
}
// detect which form the answer surface is, relative to its base headword
function detectForm(base,surface){
  base=base.toLowerCase();surface=surface.toLowerCase();
  const lastBase=base.split(" ").pop();
  const lastSurf=surface.split(" ").pop();
  if(lastSurf===lastBase)return "base";
  if(lastSurf===ing(lastBase))return "ing";
  if(lastSurf===past(lastBase))return "past";
  if(lastSurf===third(lastBase))return "s";
  // fallback by suffix
  if(lastSurf.endsWith("ing"))return "ing";
  if(lastSurf.endsWith("ed"))return "past";
  if(lastSurf.endsWith("s")&&lastSurf!==lastBase)return "s";
  return "base";
}
function safeForm(w,form){ // only inflect into a form this word is attested in
  if(form==="base")return w.word;
  if(w.word.includes(" "))return w.word; // don't inflect phrases
  if(w.forms&&w.forms.includes(form))return inflect(w.word,form);
  return w.word; // fall back to base to avoid implausible forms
}
function distractors(c,n){ // wrong words, matched to the answer's grammatical form when plausible
  const form=detectForm(wordById[c.wordId].word,c.answer);
  const pool=WORDS.filter(w=>w.id!==c.wordId);
  const same=pool.filter(w=>w.unit===c.unit);
  const others=pool.filter(w=>w.unit!==c.unit);
  const seen=new Set([c.answer.toLowerCase(),wordById[c.wordId].word.toLowerCase()]);
  const out=[];
  // prefer distractors that CAN take the answer's form, so options blend
  const ordered=shuffle(same).concat(shuffle(others));
  const canForm=ordered.filter(w=>form==="base"||(w.forms&&w.forms.includes(form)));
  const rest=ordered.filter(w=>!(form==="base"||(w.forms&&w.forms.includes(form))));
  for(const w of canForm.concat(rest)){
    let surf=safeForm(w,form);
    const k=surf.toLowerCase();
    if(seen.has(k))continue; seen.add(k); out.push(surf);
    if(out.length>=n)break;
  }
  return out;
}

/* ================= MODE: FLASHCARD (速记 + memory) ================= */
let f={list:[],idx:0,answered:false};
function flashUnits(){return store.flash.units||UNITS.slice();}
function buildFlashOrder(){
  const us=new Set(flashUnits());
  const ids=CLOZES.filter(c=>us.has(c.unit)).map(c=>c.id);
  return shuffle(ids);
}
function startFlash(reset){
  if(reset||!store.flash.order||!store.flash.order.length){
    store.flash.order=buildFlashOrder();store.flash.pos=0;store.flash.seen=[];
    store.flash.right=0;store.flash.wrong=0;save();

  f.list=store.flash.order;f.idx=store.flash.pos;f.answered=false;
  renderFlash();
}
function renderFlash(){

    <div class="sent">${sentHTML(c)}</div>

    <div class="opts" id="opts">
      ${opts.map((o,i)=>`<button class="opt" data-w="${o.replace(/"/g,'&quot;')}">
        <span class="k">${"ABCD"[i]}</span><span>${o}</span></button>`).join("")}
    </div>
    <div id="rev"></div>
    <div class="controls hide" id="nextWrap">
      <button class="btn ghost" id="restartF">重新开始</button>
      <div class="spacer"></div>
      <button class="btn" id="nextF">下一题 →</button>
    </div>

  f.answered=false;
  $("#opts").querySelectorAll(".opt").forEach(b=>b.onclick=()=>answerFlash(b,c,correct));
  $("#seenBtn").onclick=openSeen;

function answerFlash(btn,c,correct){
  if(f.answered)return; f.answered=true;
  const chosen=btn.dataset.w, ok=chosen===correct;
  view.querySelectorAll(".opt").forEach(b=>{
    b.disabled=true;
    if(b.dataset.w===correct)b.classList.add("correct");
    else if(b===btn)b.classList.add("wrong");
  });
  if(ok)store.flash.right++; else {store.flash.wrong++;markWrong(c);}
  // record seen
  store.flash.seen.push({id:c.id,ok});
  store.flash.pos=f.idx+1; save();
  $("#rev").innerHTML=`<div class="reveal">
    <div class="w">${wordById[c.wordId].word}</div>

function renderFlashDone(){

      <div><div class="n g">${store.flash.right}</div><div class="c">答对</div></div>
      <div><div class="n b">${store.flash.wrong}</div><div class="c">答错</div></div>
      <div><div class="n">${store.flash.seen.length}</div><div class="c">已过句子</div></div>
    </div>
    <div class="controls" style="justify-content:center">

/* ================= MODE: MATCH EXAM (模拟考) =================
   一页同时列出 15 个挖空句子 + 一个 20 词的词库
   （15 个正确答案 + 5 个干扰词）。点词 → 点句子空格填入，
   可改可清，统一交卷判分。 */
let exam=null;
function buildExam(){
  // 15 sentences from DISTINCT words so each blank maps to one bank word
  const byWord={};
  shuffle(CLOZES).forEach(c=>{if(!byWord[c.wordId])byWord[c.wordId]=c;});
  const chosen=pick(Object.values(byWord),Math.min(15,Object.keys(byWord).length));
  // correct answers use the sentence's actual inflected form
  const answerWords=chosen.map(c=>c.answer);
  const usedIds=new Set(chosen.map(c=>c.wordId));
  // forms actually present among answers, so distractors can blend in
  const forms=chosen.map(c=>detectForm(wordById[c.wordId].word,c.answer));
  const lowAns=new Set(answerWords.map(w=>w.toLowerCase()));
  const rawDistract=pick(WORDS.filter(w=>!usedIds.has(w.id)&&!lowAns.has(w.word.toLowerCase())),
                         Math.max(0,20-chosen.length));
  // give each distractor a random form drawn from the answer-form distribution,
  // but only into forms the distractor word actually attests (else base)
  const distract=[];
  const seen=new Set(lowAns);
  for(const w of rawDistract){
    const f=forms.length?forms[Math.random()*forms.length|0]:"base";
    let surf=safeForm(w,f);
    if(seen.has(surf.toLowerCase()))surf=w.word; // avoid collision
    if(seen.has(surf.toLowerCase()))continue;
    seen.add(surf.toLowerCase());distract.push(surf);
  }
  const bank=shuffle([...answerWords,...distract]);
  return {sents:chosen,bank,placed:{},submitted:false,selWord:null};
}
function startExam(){exam=buildExam();renderExam();}
function renderExam(){
  if(exam.submitted)return renderExamResult();
  const placedWords=new Set(Object.values(exam.placed));
  const filled=Object.keys(exam.placed).length;
  view.innerHTML=`
  <div class="toolbar">
    <div class="left"><span class="chip">选词填空 · 15 句</span></div>
    <div class="chips"><span class="chip acc">已填 <b id="filledN">${filled}/${exam.sents.length}</b></span></div>
  </div>
  <div class="card" style="padding-bottom:14px">
    <div class="eyebrow"><span>模拟考 · WORD BANK</span><span>${exam.bank.length} 个备选 · 含干扰词</span></div>
    <p style="color:var(--mut);font-size:13px;margin:-4px 0 14px">先点下方词库里的一个词，再点句子里的空格填入；点已填的空格可取消。全部判分。</p>
    <div id="sentList">${exam.sents.map((c,i)=>sentRow(c,i)).join("")}</div>
  </div>
  <div class="bankbar" id="bankbar">
    <div class="bankhead"><span>词库 Word Bank</span><span id="bankLeft">剩 ${exam.bank.length-placedWords.size}</span></div>
    <div class="bankwords" id="bankwords">${
      exam.bank.map(w=>`<button class="bw ${placedWords.has(w)?"used":""}" data-w="${esc(w)}">${w}</button>`).join("")}</div>
    <button class="btn" id="submitExam" style="width:100%;margin-top:12px" ${filled<exam.sents.length?"disabled":""}>交卷判分</button>
  </div>`;
  bindExam();
}
function sentRow(c,i){
  const placed=exam.placed[i];
  const blank=placed
    ? `<span class="slot filled" data-i="${i}">${placed}</span>`
    : `<span class="slot empty" data-i="${i}">　　　　</span>`;
  return `<div class="exrow">
    <span class="exn">${String(i+1).padStart(2,"0")}</span>
    <span class="extxt">${c.sentence.replace("______",blank)}</span>
  </div>`;
}
function bindExam(){
  view.querySelectorAll(".bw").forEach(b=>b.onclick=()=>{
    if(b.classList.contains("used"))return;
    if(exam.selWord===b.dataset.w){exam.selWord=null;b.classList.remove("sel");return;}
    view.querySelectorAll(".bw.sel").forEach(x=>x.classList.remove("sel"));
    exam.selWord=b.dataset.w;b.classList.add("sel");
  });
  view.querySelectorAll(".slot").forEach(s=>s.onclick=()=>{
    const i=+s.dataset.i;
    if(exam.placed[i]){ // unfill -> return word to bank
      delete exam.placed[i];
    } else if(exam.selWord){
      exam.placed[i]=exam.selWord;exam.selWord=null;
    } else {return;}
    renderExam();
  });
  const sb=$("#submitExam");
  if(sb)sb.onclick=()=>{
    if(Object.keys(exam.placed).length<exam.sents.length){toast("还有空格没填");return;}
    exam.submitted=true;renderExam();
  };
}
function renderExamResult(){
  let right=0;const rows=exam.sents.map((c,i)=>{
    const ans=c.answer, got=exam.placed[i]||"";
    const ok=got.toLowerCase()===ans.toLowerCase();
    if(ok)right++;else markWrong(c);
    return {c,ans,got,ok};
  });
  const total=exam.sents.length, score=Math.round(right/total*100);
  view.innerHTML=`<div class="card result" style="text-align:center">
    <div class="lbl">模拟考完成</div>
    <div class="big">${right}<span style="font-size:24px;color:var(--faint)">/${total}</span></div>
    <div class="row"><div><div class="n ${score>=60?'g':'b'}">${score}%</div><div class="c">正确率</div></div>
      <div><div class="n b">${total-right}</div><div class="c">错题</div></div></div>
    <p style="color:var(--mut);font-size:13px;margin:2px 0 14px">${score>=90?"优秀，几乎全中。":score>=60?"错题已收进错题本，下面看解析。":"再练一轮，错题本里见。"}</p>
    <div class="controls" style="justify-content:center;margin-bottom:6px">
      <button class="btn ghost" id="toWrong">错题本</button>
      <button class="btn" id="examAgain">再考一次</button></div>
  </div>
  <div class="card" style="margin-top:14px">
    <div class="eyebrow"><span>逐题解析 · REVIEW</span></div>
    <div id="exreview">${rows.map((r,i)=>exReview(r,i)).join("")}</div>
  </div>`;
  $("#examAgain").onclick=startExam;
  $("#toWrong").onclick=()=>setMode("wrong");
}
function exReview(r,i){
  const full=r.c.full.replace(new RegExp("("+r.ans.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","i"),"<em>$1</em>");
  return `<div class="seen-item">
    <div class="sw">${r.ok?'<span style="color:var(--good)">✓</span>':'<span style="color:var(--bad)">✗</span>'}
      ${String(i+1).padStart(2,"0")}. ${r.ans}${r.ans.toLowerCase()!==wordById[r.c.wordId].word.toLowerCase()?` <span class="g" style="color:var(--faint)">← ${wordById[r.c.wordId].word}</span>`:""}<span class="g">${wordById[r.c.wordId].gloss||""}</span></div>
    ${r.ok?"":`<div class="meta" style="margin:4px 0"><span style="color:var(--bad)">你填：${r.got||"（空）"}</span></div>`}
    <div class="ss">${full}</div>
    <div class="sz">${r.c.zh}</div>
    <div class="meta"><span>${r.c.unit}</span></div>
  </div>`;
}

/* ================= MODE: ENDLESS (无尽 100 HP, dmg ×2) ================= */
let en=null;
function startEndless(){
  en={hp:100,dmg:1,streak:0,answered:0,right:0,wrong:0,pool:shuffle(CLOZES.map(c=>c.id)),pi:0};
  renderEndless();
}
function nextEndlessId(){
  if(en.pi>=en.pool.length){en.pool=shuffle(en.pool);en.pi=0;}
  return en.pool[en.pi++];
}
function renderEndless(){
  if(en.hp<=0)return renderEndlessDead();
  const c=clozeById[nextEndlessId()];
  const correct=c.answer;
  const opts=shuffle([correct,...distractors(c,3)]);
  const low=en.hp<=25;
  view.innerHTML=`
  <div class="toolbar"><div class="left"><span class="chip bad">回合 <b>${en.answered+1}</b></span>
    <span class="chip">连对 <b>${en.streak}</b></span></div>
    <div class="chips"><span class="chip">最佳 <b>${store.endlessBest}</b></span></div></div>
  <div class="card">
    <div class="hpwrap">
      <div class="hphead"><span>HP</span><span><b>${en.hp}</b>/100 · 下次伤害 <span class="dmg">−${en.dmg}</span></span></div>
      <div class="hpbar ${low?"low":""}"><i style="width:${Math.max(0,en.hp)}%"></i></div>
    </div>
    <div class="eyebrow"><span>无尽 · ENDLESS</span><span class="u">${c.unit}</span></div>
    <div class="sent">${sentHTML(c)}</div>
    <div class="hintrow">答错扣血，且伤害翻倍（1→2→4→8…）。撑到 0 血结束。</div>
    <div class="opts" id="opts">
      ${opts.map((o,i)=>`<button class="opt" data-w="${o.replace(/"/g,'&quot;')}"><span class="k">${"ABCD"[i]}</span><span>${o}</span></button>`).join("")}
    </div>
    <div id="rev"></div>
  </div>`;
  let done=false;
  view.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    if(done)return;done=true;const ok=b.dataset.w===correct;
    view.querySelectorAll(".opt").forEach(x=>{x.disabled=true;
      if(x.dataset.w===correct)x.classList.add("correct");else if(x===b)x.classList.add("wrong");});
    en.answered++;
    if(ok){en.right++;en.streak++;
      $("#rev").innerHTML=`<div class="reveal"><div class="full">${fillFull(c)}</div><div class="tr">${c.zh}</div></div>`;
      setTimeout(renderEndless,600);
    }else{
      en.wrong++;en.streak=0;en.hp-=en.dmg;markWrong(c);
      const took=en.dmg; en.dmg*=2;
      $("#rev").innerHTML=`<div class="reveal" style="border-left-color:var(--blood)">
        <div class="w" style="color:var(--blood)">−${took} HP</div>
        <div class="g">正解：<b style="color:var(--acc)">${wordById[c.wordId].word}</b> · ${wordById[c.wordId].gloss||""}</div>
        <div class="full">${fillFull(c)}</div><div class="tr">${c.zh}</div></div>`;
      // update hp bar visually
      const bar=$(".hpbar i");if(bar)bar.style.width=Math.max(0,en.hp)+"%";
      const hb=$(".hphead b");if(hb)hb.textContent=Math.max(0,en.hp);
      setTimeout(renderEndless, en.hp<=0?900:1500);
    }
  });
}
function renderEndlessDead(){
  const survived=en.answered;
  const best=Math.max(store.endlessBest,survived);
  const isNew=survived>store.endlessBest;
  store.endlessBest=best;save();
  view.innerHTML=`<div class="card result">
    <div class="lbl">${isNew?"新纪录 · NEW RECORD":"挑战结束"}</div>
    <div class="big">${survived}</div>
    <div class="result"><div class="c" style="font-family:var(--mono);color:var(--faint);letter-spacing:2px">回合存活</div></div>
    <div class="row">
      <div><div class="n g">${en.right}</div><div class="c">答对</div></div>
      <div><div class="n b">${en.wrong}</div><div class="c">致命失误</div></div>
      <div><div class="n">${best}</div><div class="c">最佳纪录</div></div>
    </div>
    <p style="color:var(--mut);font-size:13.5px;margin:4px 0 14px">${en.wrong<=1?"一次失误就倒下——伤害翻倍太狠了。":"前几次错代价小，后面每错一次都要命。"}</p>
    <div class="controls" style="justify-content:center">

  $("#endAgain").onclick=startEndless;

}

function drillWrong(ids){

function renderDrill(){
  if(wb.idx>=wb.list.length){
    view.innerHTML=`<div class="card result">
      <div class="lbl">错题重练完成</div><div class="big">✓</div>
      <p style="color:var(--mut);margin:4px 0 16px">答对的题已移出错题本。</p>
      <div class="controls" style="justify-content:center">
        <button class="btn" id="backWB">返回错题本</button></div></div>`;
    $("#backWB").onclick=startWrong;return;
  }
  const id=wb.list[wb.idx];
  if(!store.wrong[id]){wb.idx++;return renderDrill();} // already cleared
  const c=clozeById[id],correct=c.answer;
  const opts=shuffle([correct,...distractors(c,3)]);
  view.innerHTML=`
  <div class="toolbar"><div class="left"><span class="chip bad">重练 <b>${wb.idx+1}/${wb.list.length}</b></span></div>
    <div class="chips"><button class="iconbtn" id="quitDrill">退出</button></div></div>
  <div class="card">
    <div class="eyebrow"><span>错题重练 · DRILL</span><span class="u">${c.unit}</span></div>
    <div class="pbar"><i style="width:${wb.idx/wb.list.length*100}%"></i></div>
    <div class="sent">${sentHTML(c)}</div>
    <div class="opts" id="opts">
      ${opts.map((o,i)=>`<button class="opt" data-w="${o.replace(/"/g,'&quot;')}"><span class="k">${"ABCD"[i]}</span><span>${o}</span></button>`).join("")}
    </div><div id="rev"></div>
    <div class="controls hide" id="nw"><div class="spacer"></div><button class="btn" id="nd">下一题 →</button></div>
  </div>`;
  $("#quitDrill").onclick=startWrong;
  let done=false;
  view.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    if(done)return;done=true;const ok=b.dataset.w===correct;
    view.querySelectorAll(".opt").forEach(x=>{x.disabled=true;
      if(x.dataset.w===correct)x.classList.add("correct");else if(x===b)x.classList.add("wrong");});
    if(ok){clearWrong(id);}else{markWrong(c);}
    $("#rev").innerHTML=`<div class="reveal"><div class="w">${wordById[c.wordId].word}</div>
      <div class="g">${wordById[c.wordId].gloss||""} ${ok?'· <b style="color:var(--good)">已掌握，移出错题本</b>':'· <b style="color:var(--bad)">仍保留</b>'}</div>
      <div class="full">${fillFull(c)}</div><div class="tr">${c.zh}</div></div>`;
    $("#nw").classList.remove("hide");$("#nd").onclick=()=>{wb.idx++;renderDrill();};$("#nd").focus();
  });
}

/* ================= drawer / overlay ================= */
function drawer(title,bodyHTML,footHTML){
  overlay.innerHTML=`<div class="drawer-bg" id="dbg"></div>
    <div class="drawer">
      <div class="drawer-h"><h3>${title}</h3><button class="x" id="dx">×</button></div>
      <div class="drawer-body">${bodyHTML}</div>
      ${footHTML?`<div style="padding:14px 18px;border-top:1px solid var(--line)">${footHTML}</div>`:""}
    </div>`;
  $("#dbg").onclick=closeDrawer;$("#dx").onclick=closeDrawer;
}
function closeDrawer(){overlay.innerHTML="";}
function emptyMsg(icon,t,s){return `<div class="empty"><span class="big">${icon}</span>${t}<br><span style="font-size:12.5px;opacity:.7">${s}</span></div>`;}

/* ================= mode switching ================= */
let mode="flash";
function setMode(m){
  mode=m;closeDrawer();
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("on",b.dataset.mode===m));
  if(m==="flash")startFlash(false);
  else if(m==="exam")startExam();
  else if(m==="endless")startEndless();
  else if(m==="wrong")startWrong();
}
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
// wrong badge on nav
(function(){const wbtn=[...document.querySelectorAll("#nav button")].find(b=>b.dataset.mode==="wrong");
  if(wbtn){const s=document.createElement("span");s.className="em";s.innerHTML=`错题 <span id="wrongCount">${Object.keys(store.wrong).length}</span>`;
    wbtn.querySelector(".em").id="wrongCount";}})();
updateWrongBadge();

// keyboard: 1-4 / A-D to answer, Enter/→ next
document.addEventListener("keydown",e=>{
  const opts=[...document.querySelectorAll("#opts .opt")].filter(b=>!b.disabled);
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  if(opts.length&&map[e.key.toLowerCase()]!=null){opts[map[e.key.toLowerCase()]]?.click();}
  if(e.key==="Enter"||e.key==="ArrowRight"){
    const n=$("#nextF")||$("#nd");if(n&&!n.closest(".hide"))n.click();
  }
});

setMode("flash");
})();

</script>
</body>
