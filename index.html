<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词练 · Word Lab</title>
<style>
:root{
  --ink:#13171c; --ink2:#1a2027; --panel:#1f2730; --line:#2c3742;
  --paper:#f3ecd9; --paper2:#e7dcbf;
  --txt:#dfe5ec; --mut:#8a97a6; --faint:#5d6975;
  --acc:#e8b04b; --acc2:#c98a2e;
  --good:#5fb98a; --bad:#e0735f; --blood:#d6473e;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --mono:"SFMono-Regular",ui-monospace,"DejaVu Sans Mono",Menlo,monospace;
  --sans:"Inter",-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, #1c242d 0%, transparent 60%),
    var(--ink);
  color:var(--txt); font-family:var(--sans);
  -webkit-font-smoothing:antialiased; line-height:1.55;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:780px;margin:0 auto;padding:22px 18px 64px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hide{display:none!important}

/* header */
header{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.logo{font-family:var(--serif);font-size:26px;letter-spacing:.5px}
.logo b{color:var(--acc);font-weight:600}
.tag{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase}

/* mode nav */
.nav{display:flex;gap:6px;background:var(--ink2);border:1px solid var(--line);border-radius:13px;padding:5px;margin-bottom:22px;flex-wrap:wrap}
.nav button{flex:1;min-width:96px;padding:10px 8px;border-radius:9px;font-size:13.5px;color:var(--mut);font-weight:550;transition:.18s;white-space:nowrap}
.nav button .em{font-family:var(--mono);font-size:10px;display:block;color:var(--faint);letter-spacing:1px}
.nav button.on{background:var(--paper);color:var(--ink);box-shadow:0 4px 14px -6px rgba(0,0,0,.6)}
.nav button.on .em{color:var(--acc2)}

/* generic card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.eyebrow .u{color:var(--acc)}

/* progress bar */
.pbar{height:5px;background:var(--ink);border-radius:3px;overflow:hidden;margin-bottom:18px}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc));transition:width .35s}

/* sentence */
.sent{font-family:var(--serif);font-size:21px;line-height:1.6;margin:8px 0 6px;color:#eef2f7}
.blank{color:var(--acc);font-weight:600;border-bottom:2px dashed var(--acc2);padding:0 2px}
.zh{color:var(--mut);font-size:14.5px;margin-top:10px;min-height:1em}
.hintrow{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:4px}

/* options */
.opts{display:grid;gap:10px;margin-top:20px}
.opt{display:flex;align-items:center;gap:12px;text-align:left;padding:13px 15px;background:var(--ink2);border:1px solid var(--line);border-radius:11px;font-size:16px;transition:.14s;width:100%}
.opt:hover:not(:disabled){border-color:var(--faint);transform:translateY(-1px)}
.opt .k{font-family:var(--mono);font-size:12px;color:var(--faint);border:1px solid var(--line);border-radius:6px;width:22px;height:22px;display:grid;place-items:center;flex:none}
.opt.correct{background:rgba(95,185,138,.13);border-color:var(--good);color:#cdeede}
.opt.correct .k{border-color:var(--good);color:var(--good)}
.opt.wrong{background:rgba(224,115,95,.12);border-color:var(--bad)}
.opt.wrong .k{border-color:var(--bad);color:var(--bad)}
.opt:disabled{cursor:default}

/* reveal panel */
.reveal{margin-top:18px;padding:15px 16px;background:var(--ink2);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:10px;animation:rise .25s}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.reveal .w{font-family:var(--serif);font-size:19px;color:var(--acc)}
.reveal .g{color:var(--mut);font-size:14px;margin-top:2px}
.reveal .full{font-size:15px;margin-top:9px;color:var(--txt)}
.reveal .full em{color:var(--acc);font-style:normal;font-weight:600;border-bottom:1px solid var(--acc2)}
.reveal .tr{color:var(--mut);font-size:13.5px;margin-top:3px}

/* footer controls */
.controls{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{padding:12px 20px;border-radius:11px;font-size:15px;font-weight:600;background:var(--paper);color:var(--ink);transition:.15s}
.btn:hover{background:#fff}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut)}
.btn.ghost:hover{border-color:var(--faint);color:var(--txt)}
.btn:disabled{opacity:.4;cursor:default}
.spacer{flex:1}

/* stat chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px}
.chip{background:var(--ink2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;color:var(--mut)}
.chip b{color:var(--txt)}
.chip.acc b{color:var(--acc)}
.chip.good b{color:var(--good)}
.chip.bad b{color:var(--bad)}

/* hp bar (endless) */
.hpwrap{margin:4px 0 18px}
.hphead{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:12px;color:var(--mut);margin-bottom:6px}
.hphead b{color:var(--blood);font-size:15px}
.hpbar{height:14px;background:#2a1414;border:1px solid #3d1f1d;border-radius:8px;overflow:hidden;position:relative}
.hpbar i{display:block;height:100%;background:linear-gradient(90deg,#a52f28,var(--blood));transition:width .4s;box-shadow:0 0 12px rgba(214,71,62,.5) inset}
.hpbar.low i{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
.dmg{font-family:var(--mono);font-size:12px;color:var(--bad)}

/* setup screen */
.setup h3{font-family:var(--serif);font-size:18px;margin-bottom:4px}
.setup p.sub{color:var(--mut);font-size:14px;margin-bottom:18px}
.unitsel{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
.utog{padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--ink2);color:var(--mut);font-family:var(--mono);font-size:13px;font-weight:600;transition:.15s}
.utog.on{background:var(--paper);color:var(--ink);border-color:var(--paper)}
.fieldlbl{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin:18px 0 6px}

/* matching mode */
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
@media(max-width:560px){.matchgrid{grid-template-columns:1fr}}
.mcol h4{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.mitem{display:block;width:100%;text-align:left;padding:12px 14px;margin-bottom:8px;background:var(--ink2);border:1px solid var(--line);border-radius:10px;font-size:15px;transition:.13s}
.mitem.sel{border-color:var(--acc);background:rgba(232,176,75,.1)}
.mitem.done{opacity:.35;cursor:default;border-style:dashed}
.mitem.flash-good{border-color:var(--good);background:rgba(95,185,138,.18)}
.mitem.flash-bad{border-color:var(--bad);background:rgba(224,115,95,.18);animation:shake .3s}
.mitem .zhsub{display:block;font-family:var(--sans);font-size:12.5px;color:var(--mut);margin-top:3px}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* exam: single-page word-bank cloze */
.exrow{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);align-items:baseline}
.exrow:last-child{border-bottom:none}
.exn{font-family:var(--mono);font-size:12px;color:var(--faint);flex:none;width:24px}
.extxt{font-family:var(--serif);font-size:17px;line-height:1.6;color:#eef2f7}
.slot{display:inline-block;min-width:78px;text-align:center;border-radius:7px;padding:1px 8px;cursor:pointer;transition:.13s;vertical-align:baseline}
.slot.empty{border-bottom:2px solid var(--acc2);color:transparent}
.slot.empty:hover{background:rgba(232,176,75,.12)}
.slot.filled{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;font-weight:600;border-bottom:2px solid var(--acc2)}
.slot.filled:hover{background:var(--paper2)}
.bankbar{position:sticky;bottom:0;margin-top:14px;background:var(--ink2);border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:0 -10px 30px -16px rgba(0,0,0,.8)}
.bankhead{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.bankwords{display:flex;flex-wrap:wrap;gap:8px}
.bw{padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-size:15px;transition:.13s}
.bw:hover:not(.used){border-color:var(--acc);transform:translateY(-1px)}
.bw.sel{background:var(--acc);color:var(--ink);border-color:var(--acc);font-weight:600}
.bw.used{opacity:.28;text-decoration:line-through;cursor:default}

/* drawer (seen sentences / wrong book) */
.drawer-bg{position:fixed;inset:0;background:rgba(8,10,13,.6);backdrop-filter:blur(2px);z-index:40;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(440px,92vw);background:var(--ink2);border-left:1px solid var(--line);z-index:41;display:flex;flex-direction:column;animation:slide .25s}
@keyframes slide{from{transform:translateX(100%)}to{transform:none}}
.drawer-h{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid var(--line)}
.drawer-h h3{font-family:var(--serif);font-size:18px}
.drawer-h .x{font-size:22px;color:var(--mut);width:34px;height:34px;border-radius:8px}
.drawer-h .x:hover{background:var(--panel);color:var(--txt)}
.drawer-body{overflow-y:auto;padding:14px 18px;flex:1}
.seen-item{padding:12px 0;border-bottom:1px solid var(--line)}
.seen-item:last-child{border-bottom:none}
.seen-item .sw{font-family:var(--serif);font-size:16px;color:var(--acc)}
.seen-item .sw .g{font-family:var(--sans);font-size:13px;color:var(--mut);margin-left:8px}
.seen-item .ss{font-size:14px;margin-top:4px;color:var(--txt)}
.seen-item .ss em{color:var(--acc);font-style:normal;border-bottom:1px solid var(--acc2)}
.seen-item .sz{font-size:13px;color:var(--mut);margin-top:2px}
.seen-item .meta{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:5px;display:flex;gap:10px}
.empty{color:var(--faint);text-align:center;padding:40px 10px;font-size:14px}
.empty .big{font-size:30px;display:block;margin-bottom:8px;opacity:.5}

/* toolbar above flashcard */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.toolbar .left{display:flex;gap:8px;align-items:center}
.iconbtn{font-family:var(--mono);font-size:12px;color:var(--mut);border:1px solid var(--line);background:var(--ink2);padding:7px 12px;border-radius:9px;transition:.14s;display:inline-flex;gap:6px;align-items:center}
.iconbtn:hover{border-color:var(--faint);color:var(--txt)}
.iconbtn b{color:var(--acc)}

/* result screen */
.result{text-align:center;padding:14px}
.result .big{font-family:var(--serif);font-size:46px;color:var(--acc);line-height:1.1}
.result .lbl{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:18px}
.result .row{display:flex;justify-content:center;gap:26px;margin:18px 0;flex-wrap:wrap}
.result .row .n{font-family:var(--serif);font-size:30px}
.result .row .n.g{color:var(--good)}
.result .row .n.b{color:var(--bad)}
.result .row .c{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:1px}

.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--paper);color:var(--ink);font-size:14px;font-weight:600;padding:11px 20px;border-radius:30px;z-index:60;box-shadow:0 10px 30px -8px rgba(0,0,0,.7);animation:rise .25s}
small.kbd{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
@media(max-width:480px){.sent{font-size:18.5px}.opt{font-size:15px}.logo{font-size:22px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">词<b>练</b> · Word Lab</div>
    <div class="tag">B2 U1–U6 · B1 U6 · 435 sentences</div>
  </header>

  <nav class="nav" id="nav">
    <button data-mode="flash" class="on"><span>速记</span><span class="em">FLASHCARD</span></button>
    <button data-mode="exam"><span>模拟考</span><span class="em">MATCH EXAM</span></button>
    <button data-mode="endless"><span>无尽</span><span class="em">ENDLESS</span></button>
    <button data-mode="wrong"><span>错题本</span><span class="em">WRONG BOOK</span></button>
  </nav>

  <main id="view"></main>
</div>
<div id="overlay"></div>
<script>
const WORDS=[{"id":0,"word":"in a row","gloss":"连续地","unit":"B1U6","examples":[{"en":"I felt a little bit tired after flying two days in a row, but my tiredness was totally replaced by excitement at seeing the splendid view.","zh":"连续两天的飞行后我有一点累，但是一见到这壮观的景色，马上兴奋不已，累意全消。"},{"en":"You lost eight points in a row at the beginning of the match. Could you talk about how nervous you were?","zh":"比赛开始的时候，你连丢8分。你说下当时有多紧张？"}],"forms":["base"]},{"id":1,"word":"doze off","gloss":"打瞌睡，打盹儿","unit":"B1U6","examples":[{"en":"The office was so hot I nearly dozed off at my desk.","zh":"办公室里很热，我差点趴在办公桌上睡着了。"},{"en":"That old man settled himself down comfortably in an armchair in front of the door and began to doze off.","zh":"老人在门前一张扶手椅上舒服地坐了下来，开始在那儿打盹。"}],"forms":["base"]},{"id":2,"word":"approve","gloss":"赞成；同意；批准","unit":"B1U6","examples":[{"en":"You may not approve of what he did, but he's still your brother.","zh":"也许你不赞成他的所作所为，但是他还是你的兄弟。"},{"en":"It's very difficult to say no to you as you can imagine, but I am not in a position to approve your proposal.","zh":"你能想象，对你说不十分困难，但我的职责有限，无法批准你的提议。"}],"forms":["base"]},{"id":3,"word":"strain","gloss":"使紧张；绷紧","unit":"B1U6","examples":[{"en":"The current trade dispute has strained relations between the two countries.","zh":"目前的贸易争端使两国关系紧张起来。"},{"en":"I would welcome some help but don't strain yourself!","zh":"我倒是盼着有人来帮忙，只是别累坏了你自己！"},{"en":"The sudden influx of visitors is straining hotels in the town to the limit.","zh":"游客突然涌入，城里的旅馆全都爆满。"}],"forms":["base","ing","past"]},{"id":4,"word":"mess","gloss":"脏乱状态","unit":"B1U6","examples":[{"en":"He always makes a terrible mess when he's cooking.","zh":"他做饭时总是把东西弄得乱七八糟的。"},{"en":"David's house is always in a mess.","zh":"大卫的房子总是又脏又乱。"},{"en":"Only the best of friends will stay after the party's over to help clean up the mess.","zh":"只有最好的朋友们会在派对结束后留下帮忙清理烂摊子。"}],"forms":["base"]},{"id":5,"word":"foundation","gloss":"基础；基本原理","unit":"B1U6","examples":[{"en":"All theories should be built on a foundation of factual knowledge.","zh":"所有理论都应当有事实根据。"},{"en":"The company sees technology and talented personnel as the foundation of its development.","zh":"公司视技术和人才为其发展之根本。"}],"forms":["base"]},{"id":6,"word":"fabric","gloss":"织物，织品","unit":"B1U6","examples":[{"en":"Never dry underwear over direct heat; it will weaken the fabric.","zh":"不要直接加热烘干内衣，那样会损坏布料。"},{"en":"The fabric is strong enough to withstand harsh processing.","zh":"这种织物非常结实，能经受粗加工。"}],"forms":["base"]},{"id":7,"word":"outbreak","gloss":"疾病等的）爆发","unit":"B1U6","examples":[{"en":"Outbreaks of rain are expected in the afternoon.","zh":"下午将有暴雨。"},{"en":"This evidence supports their opinion that the outbreak of violence was prearranged.","zh":"这一证据证实了他们的看法，即此次突发暴力事件是有预谋的。"}],"forms":["base","s"]},{"id":8,"word":"anniversary","gloss":"周年纪念日","unit":"B1U6","examples":[{"en":"It was their 25th wedding anniversary last Saturday.","zh":"上周六是他们结婚25周年纪念。"},{"en":"We are planning a dinner to celebrate the 50th anniversary of the founding of the company.","zh":"我们正在筹备一场晚宴，庆祝公司成立50周年。"}],"forms":["base"]},{"id":9,"word":"remarkable","gloss":"值得注意的；非凡的","unit":"B1U6","examples":[{"en":"She has remarkable powers of observation.","zh":"她有非凡的观察力。"},{"en":"The 20th century was remarkable for its inventions.","zh":"20世纪重大发明不断，令人惊叹。"}],"forms":["base"]},{"id":10,"word":"come to/reach a conclusion","gloss":"得出结论","unit":"B1U6","examples":[{"en":"Did you come to/reach any conclusions at the meeting this morning?","zh":"今天上午的会议上你们有没有做出什么决定？"},{"en":"At first I thought he was a bit shy, but I've come to the conclusion that he's simply unfriendly!","zh":"起初我以为他有点害羞，可是后来我断定他就是不友好！"}],"forms":["base","s"]},{"id":11,"word":"puzzle","gloss":"难题；谜","unit":"B1U6","examples":[{"en":"Scientists have been trying to solve this puzzle for years.","zh":"多年来科学家们一直试图解开这个谜。"},{"en":"She had a complex personality that was a real puzzle to me.","zh":"她的性格很复杂，对我来说真是个谜。"}],"forms":["base"]},{"id":12,"word":"concentrate","gloss":"聚集；聚精会神","unit":"B1U6","examples":[{"en":"The company is concentrating its resources on developing new products.","zh":"公司正在集中力量开发新产品。"},{"en":"It's a good film, but the plot is very complicated and you really have to concentrate.","zh":"这部片子不错，但是情节很复杂，你得聚精会神。"}],"forms":["base","ing"]},{"id":13,"word":"beyond (any) doubt","gloss":"毫无疑问","unit":"B1U6","examples":[{"en":"His honesty is quite beyond doubt.","zh":"他的诚实是毋庸置疑的。"},{"en":"The research showed beyond doubt that smoking contributes to heart disease.","zh":"这项研究确切表明吸烟会诱发心脏疾病。"}],"forms":["base"]},{"id":14,"word":"not give/care a fig (for sb./sth.)","gloss":"对…毫不在乎","unit":"B1U6","examples":[{"en":"They can say what they like. I don't give a fig.","zh":"他们愿意说什么都行，我根本不在乎。"},{"en":"She wouldn't give a fig for her neighbors' gossip.","zh":"邻居们的闲言碎语她丝毫不放在心上。"}],"forms":["base"]},{"id":15,"word":"presence","gloss":"出席，到场","unit":"B1U6","examples":[{"en":"The document was signed in the presence of two witnesses.","zh":"这项文件签署时有两个证人在场。"},{"en":"The presence of pollen in the atmosphere causes asthma in some people.","zh":"大气中飘扬的花粉会使一些人患上哮喘。"}],"forms":["base"]},{"id":16,"word":"undermine","gloss":"暗中破坏；逐渐损害","unit":"B1U6","examples":[{"en":"I don't want to do something that would undermine the chances of success.","zh":"我不想做会影响成功机会的事情。"},{"en":"He's been trying to undermine her authority by spreading rumours about her.","zh":"他一直在散布有关她的种种谣言，以此削弱她的权威。"},{"en":"You'll get nowhere if you follow his instruction.","zh":"要是你按他的方法去做，将会一事无成。"},{"en":"Bad manners will get you nowhere (= will not help you to succeed).","zh":"不讲礼貌会让你到处碰壁。"},{"en":"If you want to get anywhere, you've got to work hard.","zh":"如果你想成功，就得努力奋斗。"}],"forms":["base"]},{"id":17,"word":"flaw","gloss":"缺陷","unit":"B1U6","examples":[{"en":"There's a fatal flaw in your reasoning.","zh":"你的推理有一处致命的缺陷。"},{"en":"The only flaw in his character seems to be a short temper.","zh":"他性格中的唯一缺点好像就是脾气急。"}],"forms":["base"]},{"id":18,"word":"accordingly","gloss":"相应地；因此；从而","unit":"B1U6","examples":[{"en":"When we receive your instructions we will act accordingly.","zh":"我们接到你的指令就会遵命行事。"},{"en":"Someone has hacked into the university mail system. We suggest that you change your passwords accordingly.","zh":"有黑客入侵了本校的邮件系统，因此我们建议各位修改密码。"},{"en":"Watch out for sharp bends and adjust your speed accordingly.","zh":"当心急转弯并相应调整车速。"}],"forms":["base"]},{"id":19,"word":"caution","gloss":"小心，谨慎","unit":"B1U6","examples":[{"en":"Statistics should be treated with caution.","zh":"对待统计数字要谨慎。"},{"en":"You must exercise/use extreme caution when crossing this road.","zh":"过这条马路时，你得特别小心。"}],"forms":["base"]},{"id":20,"word":"believe in","gloss":"对…有信心；信仰，信任","unit":"B1U6","examples":[{"en":"The school believes in letting children learn at their own pace.","zh":"这个学校认为要让孩子按着自己的进度学习。"},{"en":"To tell you the truth, I don't believe in private hospitals which claim to be able to cure any disease.","zh":"老实说，我不相信那些声称能治愈一切疾病的私立医院。"}],"forms":["base"]},{"id":21,"word":"intuition","gloss":"直觉","unit":"B1U6","examples":[{"en":"I had an intuition that something awful was about to happen.","zh":"我凭直觉感到要出乱子了。"},{"en":"Intuition told her it was unwise to argue.","zh":"直觉告诉她争吵是不明智的。"}],"forms":["base"]},{"id":22,"word":"inspiration","gloss":"灵感","unit":"B1U6","examples":[{"en":"Both poets drew their inspiration from the countryside.","zh":"两位诗人都是从乡村获得他们的灵感。"},{"en":"The golden autumn light provided the inspiration for the painting.","zh":"秋天金色的阳光给这幅画的创作带来了灵感。"}],"forms":["base"]},{"id":23,"word":"at the turn of the century","gloss":"在世纪初","unit":"B1U6","examples":[{"en":"Her family moved to America at the turn of the century.","zh":"她们全家在世纪之初移居到美国。"},{"en":"The young painter embraced Marxism at the turn of the century.","zh":"这位年轻画家在本世纪初开始信奉马克思主义。"}],"forms":["base"]},{"id":24,"word":"impressive","gloss":"给人以深刻印象的","unit":"B1U6","examples":[{"en":"There are some very impressive buildings in the town.","zh":"镇上有一些建筑物给人深刻的印象。"},{"en":"That was an impressive performance from such a young tennis player.","zh":"这么年轻的网球选手居然打得那么好。"}],"forms":["base"]},{"id":25,"word":"stimulate","gloss":"使兴奋；刺激","unit":"B1U6","examples":[{"en":"The government plans to cut taxes in order to stimulate the economy.","zh":"政府计划减税以刺激经济发展。"},{"en":"Good teachers should ask questions that stimulate students to think.","zh":"好的老师应该问一些能激发学生们思考的问题。"}],"forms":["base"]},{"id":26,"word":"intelligent","gloss":"有才智的；聪颖的","unit":"B1U6","examples":[{"en":"Man is still far more intelligent than the cleverest robot.","zh":"人类还是比最酷的机器人聪明得多。"},{"en":"She's obviously very intelligent, but her lectures are difficult to follow.","zh":"显然，她聪明睿智，但是她的讲座很难听得懂。"}],"forms":["base"]},{"id":27,"word":"talent","gloss":"天赋；天才","unit":"B1U6","examples":[{"en":"She showed her talent for music at an early age.","zh":"她小时候就表现出了音乐天赋。"},{"en":"His artistic talents were wasted in his boring job.","zh":"他的艺术天分被枯燥乏味的工作消磨殆尽。"}],"forms":["base","s"]},{"id":28,"word":"credit sth. to sb./sth.","gloss":"把…归于","unit":"B1U6","examples":[{"en":"She credited her recovery to an innovative treatment.","zh":"她把她的康复归因于一种创新疗法。"},{"en":"The invention of the medical robot is credited to this company.","zh":"医疗机器人的发明应归功于这家公司。"}],"forms":["base"]},{"id":29,"word":"imagination","gloss":"想象力","unit":"B1U6","examples":[{"en":"My younger son has a very vivid imagination.","zh":"我的小儿子想象力很丰富。"},{"en":"I can never make up stories — I have absolutely no imagination.","zh":"我从来都不会编故事——我根本没什么想象力。"}],"forms":["base"]},{"id":30,"word":"combine","gloss":"使）结合；（使）联合","unit":"B1U6","examples":[{"en":"None of us has much money so let's combine what we've got.","zh":"我们谁都没多少钱，因此就把我们所有的钱凑在一起吧。"},{"en":"These normally harmless substances combine to form a highly poisonous gas.","zh":"这些通常情况下无害的物质混合在一起后会形成一种毒性很强的气体。"}],"forms":["base"]},{"id":31,"word":"if anything","gloss":"要说有什么区别的话；甚至正相反","unit":"B1U6","examples":[{"en":"Sam didn't seem too disappointed at losing. If anything, he seemed relieved that it was all over.","zh":"比赛失利萨姆好像并不是太失望。要说有什么的话，比赛结束了，他好像松了一口气。"},{"en":"Joe isn't a bad boy. If anything, he's a pretty good one.","zh":"乔不是一个坏男孩。正相反，他是一个非常好的男孩。"}],"forms":["base"]},{"id":32,"word":"location","gloss":"地点，场所","unit":"B2U1","examples":[{"en":"Witnesses showed the police the exact location of the accident.","zh":"目击者向警方指出事故发生的确切地点。"},{"en":"The school is going to move to a new location.","zh":"学校将搬迁新址。"}],"forms":["base"]},{"id":33,"word":"address","gloss":"向…讲话","unit":"B2U1","examples":[{"en":"When you address the audience, you could start off with a question to take hold of their attention.","zh":"在对观众讲话时，你可以先用提问的形式吸引他们的注意力。"},{"en":"I don't like being addressed as \"Hi beautiful\". I'm more than my looks.","zh":"我不喜欢别人和我打招呼的时候叫我\"美人\"。相貌不代表我的全部。"},{"en":"What does science say are ways to address climate change?","zh":"有科学证据的应对气候变化的方法有哪些？"},{"en":"The number of arrests is up as the police work to address crime and disorder.","zh":"因为警方加大打击犯罪和骚乱的力度，所以逮捕量增加了。"}],"forms":["base","past"]},{"id":34,"word":"embarrass","gloss":"使…尴尬/羞愧/紧张","unit":"B2U1","examples":[{"en":"I was totally embarrassed when my cousin told me I had spinach in my teeth.","zh":"当我堂兄提醒我牙齿里嵌着菠菜时，我尴尬得要死。"},{"en":"Don't embarrass me by mentioning my mistake again.","zh":"别再提我犯的错啦，羞死人了。"}],"forms":["base","past"]},{"id":35,"word":"dumb","gloss":"愚蠢的","unit":"B2U1","examples":[{"en":"He was so dumb that he left his keys at home again.","zh":"他这个蠢货又把钥匙丢家里了。"},{"en":"Don't be so dumb. You can't get a loan from the bank if you are laid off.","zh":"别傻了。要是你下了岗，银行才不会贷款给你呢。"},{"en":"Children born deaf and dumb can nowadays be taught to speak and lip-read.","zh":"天生聋哑的儿童如今也能学会讲话和读唇语。"},{"en":"Martin was born dumb, yet still he managed to get a good job.","zh":"马丁生来失语，但他还是找到了一份好工作。"}],"forms":["base"]},{"id":36,"word":"in unison","gloss":"一致地；一起","unit":"B2U1","examples":[{"en":"The children find it difficult to play their instruments in unison.","zh":"孩子们发现合奏有困难。"},{"en":"The international community is ready to work in unison against terrorism.","zh":"国际社会愿意通力合作对抗恐怖主义。"}],"forms":["base"]},{"id":37,"word":"consist of","gloss":"由…组成","unit":"B2U1","examples":[{"en":"The book consists of 100 essays written over the last twenty years.","zh":"这本书收录了过去二十年间写成的一百篇随笔。"},{"en":"The committee consists of scientists and engineers.","zh":"该委员会的成员都是科学家和工程师。"}],"forms":["base"]},{"id":38,"word":"typical","gloss":"有代表性的；典型的","unit":"B2U1","examples":[{"en":"In a typical day at the library I help people borrow books from other libraries and obtain articles from journals we don't have subscriptions to.","zh":"我在图书馆每天的工作基本就是帮人向别的图书馆借书、从我们馆没有订阅的期刊那里获取文章。"},{"en":"Sleeplessness, digestion problems, unhealthy weight gain or loss, and muscle tension are all typical symptoms of stress.","zh":"失眠、消化不良、不健康的增肥或消瘦、肌肉紧张等都是压力过大的典型症状。"}],"forms":["base"]},{"id":39,"word":"assure","gloss":"向（某人）保证，使确信","unit":"B2U1","examples":[{"en":"The salesperson assured her that the computer had all the software to do video editing.","zh":"销售员向她保证说，所有视频编辑软件在这台电脑里都有。"},{"en":"I can assure you that my father has never heard of the Beatles.","zh":"我可以向你保证，我父亲从未听说过披头士乐队。"},{"en":"You left the door unlocked? I thought you'd know better.","zh":"你没锁门？我还以为你挺有头脑不会不锁的。"},{"en":"He knew better than to argue with Phil at that moment.","zh":"他头脑冷静，知道那时候不适合跟菲尔争论。"}],"forms":["base","past"]},{"id":40,"word":"fade","gloss":"变黯淡，褪色","unit":"B2U1","examples":[{"en":"All colors fade — especially under the impact of direct sunlight.","zh":"所有的颜色都会褪——尤其是在阳光直射下。"},{"en":"The sunlight gradually faded.","zh":"日光逐渐消退。"},{"en":"Her enthusiasm for early-morning exercises faded as the weather was getting colder and colder.","zh":"天气越来越冷，她晨练的热情不再。"},{"en":"They watched the mountains fade into the darkness.","zh":"他们目睹群山被夜色吞没。"}],"forms":["base","past"]},{"id":41,"word":"keep (sb.) in suspense","gloss":"使产生悬念，故意迟迟不告诉","unit":"B2U1","examples":[{"en":"The audience is kept in suspense to the very end of the play.","zh":"该剧的悬念一直持续到剧终。"},{"en":"I won't keep you in suspense any longer. Here are the results of the mid-term exam.","zh":"我就不再让你们的心悬着了，这就宣布期中考试成绩。"}],"forms":["base"]},{"id":42,"word":"bet","gloss":"敢肯定，确信","unit":"B2U1","examples":[{"en":"I bet she was late for the meeting on purpose.","zh":"我敢打赌，她是故意开会迟到的。"},{"en":"I bet he'll change his mind again.","zh":"我觉得他还会改变主意。"}],"forms":["base"]},{"id":43,"word":"distract","gloss":"使分心","unit":"B2U1","examples":[{"en":"One way to distract yourself from smoking is keeping your hands and mouth busy. Try some sunflower seeds.","zh":"如果不想老惦记着抽烟，你可以让自己的手和嘴巴忙活起来。试试嗑葵瓜子吧。"},{"en":"I was so distracted by the news that I forgot to put on a coat before leaving home.","zh":"这个新闻让我失神落魄，出门都忘了穿外套。"}],"forms":["base","past"]},{"id":44,"word":"clench","gloss":"咬紧；握紧","unit":"B2U1","examples":[{"en":"Clenching teeth during sleep can cause damage to teeth.","zh":"睡觉时咬紧牙关会损坏牙齿。"},{"en":"Only her clenched hands showed how hard she was trying to hang on to self-control.","zh":"只有她紧握的双手透露了她正在竭力控制自己的情绪。"}],"forms":["base","ing","past"]},{"id":45,"word":"hysterical","gloss":"歇斯底里的","unit":"B2U1","examples":[{"en":"She was so hysterical that the 911 operator had difficulty understanding what had happened.","zh":"她说话时歇斯底里，911接线警官听不懂到底发生了什么事。"},{"en":"Many American parents became hysterical about campus shootings.","zh":"校园枪击案让许多美国家长情绪失控。"}],"forms":["base"]},{"id":46,"word":"somewhat","gloss":"有几分","unit":"B2U1","examples":[{"en":"The speaker seemed somewhat embarrassed, and his face reddened.","zh":"发言人似乎有点尴尬，脸也涨红了。"},{"en":"Feeling somewhat angry, Phil ignored the pet cat upon returning home.","zh":"菲尔有点生气，所以回到家里连宠物猫都不理睬了。"}],"forms":["base"]},{"id":47,"word":"glorious","gloss":"极好的；辉煌的；光荣的","unit":"B2U1","examples":[{"en":"It seems a pity to stay indoors on such a glorious day.","zh":"天气这么好，不出去玩就太可惜了。"},{"en":"Vivid memories of the glorious, romantic sophomore year now came flooding back.","zh":"美好浪漫的大二记忆栩栩如生，现在如潮水般涌来。"},{"en":"Liu Hulan is a heroine, and she lived a great life and died a glorious death.","zh":"刘胡兰是个女英雄，她生的伟大，死的光荣。"},{"en":"A glorious death is his, who for his country falls.","zh":"为国捐躯，死得光荣。"}],"forms":["base"]},{"id":48,"word":"hand down (to sb.)","gloss":"把…传下去","unit":"B2U1","examples":[{"en":"The art of story-telling has been handed down from mother to daughter in this family.","zh":"这个家族讲故事的才能由母女相传。"},{"en":"She had some jewelry which had been handed down from her grandmother.","zh":"她手里有一些祖母传下来的珠宝。"}],"forms":["base"]},{"id":49,"word":"at any rate","gloss":"无论如何，不管怎样","unit":"B2U1","examples":[{"en":"At any rate, you survived the car accident.","zh":"不管怎么样，虽然发生了车祸，但你活了下来。"},{"en":"At any rate, we have done one part of the job.","zh":"无论如何，我们已经做完了工作的一部分。"}],"forms":["base"]},{"id":50,"word":"community","gloss":"社区；社会","unit":"B2U1","examples":[{"en":"Police work to prevent crime and to protect the lives and property of the people in a community.","zh":"警方努力防止犯罪，保护社区居民的人身和财产安全。"},{"en":"College students have learned a lot by doing community service.","zh":"大学生们通过社区服务受益良多。"}],"forms":["base"]},{"id":51,"word":"welfare","gloss":"福利；幸福","unit":"B2U1","examples":[{"en":"Parents are responsible for the welfare of their children.","zh":"父母们应对孩子的幸福负责。"},{"en":"Employers should be concerned with the welfare of their employees.","zh":"雇主应当关心员工福利。"}],"forms":["base"]},{"id":52,"word":"narrow down","gloss":"缩小…的范围","unit":"B2U1","examples":[{"en":"Over a hundred applicants will be narrowed down to a short list of five candidates.","zh":"一百余位求职者经过遴选，最后只会剩下五位候选人。"},{"en":"The police department attempted to narrow down the list of suspects.","zh":"警方努力缩小嫌疑人的范围。"}],"forms":["base"]},{"id":53,"word":"repeatedly","gloss":"反复地","unit":"B2U1","examples":[{"en":"We have repeatedly requested that staff should not be allowed to smoke in the office.","zh":"我们再三要求员工不得在办公室吸烟。"},{"en":"I have repeatedly warned you not to take the job.","zh":"我警告过你好多次，不要接受那份工作。"}],"forms":["base"]},{"id":54,"word":"come over","gloss":"某种感觉）突然影响（某人）","unit":"B2U1","examples":[{"en":"A great sense of calm came over me when I learned that I was not held responsible for the accident.","zh":"当我得知我不用为这一事故担责时，我的心情顿时平静了下来。"},{"en":"He has never been so rude to me. What's come over him?","zh":"他从来都没有对我这么粗鲁过。他这是怎么了？"}],"forms":["base"]},{"id":55,"word":"scheme","gloss":"阴谋，诡计；计划","unit":"B2U1","examples":[{"en":"The seemingly profitable fund turned out to be a scheme causing considerable losses to many investors.","zh":"这个看似有利可图的基金到后来被证明是骗人的，给投资人造成了很大的损失。"},{"en":"The country has yet to work out a scheme for creating employment.","zh":"这个国家还没有研究制定出创造就业岗位的计划。"}],"forms":["base"]},{"id":56,"word":"worthwhile","gloss":"值得做的","unit":"B2U1","examples":[{"en":"Failure could be a worthwhile experience if we learn a lesson from it.","zh":"要是能从失败中总结经验教训，那么失败也可以是一种有价值的体验。"},{"en":"I consider teaching a worthwhile career.","zh":"我认为教师是一个值得从事的职业。"}],"forms":["base"]},{"id":57,"word":"frank","gloss":"坦白的，直率的","unit":"B2U1","examples":[{"en":"To be frank with you, I think you are making a mistake.","zh":"说老实话，我觉得你在犯错误。"},{"en":"Our discussions were frank and fruitful.","zh":"我们的讨论坦诚而有成效。"}],"forms":["base"]},{"id":58,"word":"humiliate","gloss":"羞辱，使丢脸","unit":"B2U1","examples":[{"en":"Apartment hunting can be a painful and humiliating experience, especially for students and other young people on a limited budget.","zh":"找房住可能让人痛苦难堪，对那些预算紧的学生和其他年轻人来说尤其如此。"},{"en":"He humiliated her by calling her a moron in front of her friends and family.","zh":"他在她朋友和家人面前叫她傻子，大大羞辱了她。"}],"forms":["base","ing","past"]},{"id":59,"word":"interference","gloss":"干涉；干扰","unit":"B2U1","examples":[{"en":"Her parents' continual interference in our affairs irritated me.","zh":"她父母老是插手我俩之间的事，烦死我了。"},{"en":"Your interference in his private affairs is unreasonable.","zh":"你干涉他的私人事务，没道理。"}],"forms":["base"]},{"id":60,"word":"dread","gloss":"畏惧，恐怖","unit":"B2U1","examples":[{"en":"Parents were filled with dread by reports of another terrorist attack in a school.","zh":"家长们因为听到又一起学校恐怖袭击的报道，心中都充满了恐惧。"},{"en":"He has always stood in dread of his father.","zh":"他一直惧怕他的父亲。"},{"en":"COVID-19 has now become the most dreaded disease.","zh":"新冠肺炎已经成为人们最害怕的疾病。"},{"en":"She dreaded making speeches in front of large audiences.","zh":"她害怕在很多听众面前做演讲。"}],"forms":["base","past"]},{"id":61,"word":"in charge of","gloss":"负责，主管","unit":"B2U1","examples":[{"en":"Who is in charge of security at this airport?","zh":"负责机场安保事务的是谁？"},{"en":"The president personally interviewed him before putting him in charge of the Sales Department.","zh":"总裁在任命他为销售部经理前，亲自同他面谈。"}],"forms":["base"]},{"id":62,"word":"proof","gloss":"证据，证明","unit":"B2U1","examples":[{"en":"Her fingerprints left at the scene were proof of her guilt.","zh":"她在现场留下的指纹是她有罪的证据。"},{"en":"Researchers have found proof that non-smokers can develop cancer by working in smoky rooms.","zh":"研究者发现的证据表明，不吸烟者有可能因为在有烟环境下工作而罹患癌症。"}],"forms":["base"]},{"id":63,"word":"over and over","gloss":"一再地；多次","unit":"B2U1","examples":[{"en":"I have turned it over and over in my mind.","zh":"这件事我已经翻来覆去想了好多遍了。"},{"en":"I've warned you over and over (again) not to make light of the enemy.","zh":"我再三警告你不要轻视敌人。"}],"forms":["base"]},{"id":64,"word":"junior","gloss":"较年幼的","unit":"B2U1","examples":[{"en":"Jane is several years junior to her husband.","zh":"简比她丈夫小几岁。"},{"en":"Do you want John Brown Senior or John Brown Junior, the father or the son?","zh":"你要找老约翰·布朗还是小约翰·布朗？他们是父子俩。"},{"en":"Having worked for five years, Jack is still a junior clerk in the office.","zh":"杰克在这个办公室已经工作五年了，但还是个低级职员。"},{"en":"His plans to get more junior doctors working at weekends sparked the first full walkouts in the hospital's history.","zh":"他让资历较浅的医生周末上班的计划触发了该医院历史上第一次全员罢工。"}],"forms":["base"]},{"id":65,"word":"annual","gloss":"年度的，一年一次的","unit":"B2U1","examples":[{"en":"The Spring Festival is always the time for our annual family reunion.","zh":"春节一直是我们家每年大团圆的时节。"},{"en":"Some credit cards charge an annual fee.","zh":"有些信用卡要收年费。"}],"forms":["base"]},{"id":66,"word":"sweat","gloss":"","unit":"B2U2","examples":[{"en":"He was sweating heavily when he returned from his run.","zh":"他跑完步后大汗淋漓。"},{"en":"It was so hot that we started to sweat as soon as we got off the train.","zh":"天气太热，我们一下火车就开始出汗了。"},{"en":"After the 1,000-meter race sweat was running off the athletes' backs.","zh":"1000米赛跑后，运动员们汗流浃背。"},{"en":"Sweat was dripping from his forehead.","zh":"汗珠从他额头往下滴。"}],"forms":["base","ing"]},{"id":67,"word":"competition","gloss":"竞赛，比赛","unit":"B2U2","examples":[{"en":"A beauty competition will be held in our city next month.","zh":"选美比赛将于下月在我市举行。"},{"en":"You don't need to eat so quickly! It's not a competition.","zh":"你不必吃得这么快！又不是比赛。"}],"forms":["base"]},{"id":68,"word":"confront","gloss":"面对（尤指比赛或敌对行动）；应对，处理","unit":"B2U2","examples":[{"en":"I got very nervous when I was confronted with the TV camera.","zh":"面对电视镜头，我变得紧张万分。"},{"en":"It's an issue we'll have to confront at some point, no matter how unpleasant it is.","zh":"不管它有多讨厌，我们终究要面对这个问题。"}],"forms":["base","past"]},{"id":69,"word":"highlight","gloss":"最精彩的部分","unit":"B2U2","examples":[{"en":"Highlights of the match will be shown after the news.","zh":"比赛的精彩片段将在新闻之后播出。"},{"en":"A highlight of his career was serving as China's ambassador to the UK.","zh":"担任中国驻英国大使是他职业生涯的高光时刻。"}],"forms":["base","s"]},{"id":70,"word":"grace","gloss":"优美，优雅；雅致","unit":"B2U2","examples":[{"en":"The woman film star has natural grace and elegance.","zh":"这位女影星举止自然优雅。"},{"en":"She handles her problems with grace and dignity.","zh":"她处理问题不失优雅和尊严。"}],"forms":["base"]},{"id":71,"word":"fantasy","gloss":"幻想","unit":"B2U2","examples":[{"en":"She dreamed of going into a fantasy world, where she could be anything she wanted.","zh":"她梦想进入梦幻世界，在那里她想要成为什么都可以。"},{"en":"He's always had fantasies about living in a castle.","zh":"他一直幻想住在城堡里。"}],"forms":["base","s"]},{"id":72,"word":"numerous","gloss":"许多的，无数的","unit":"B2U2","examples":[{"en":"She has proved her worth on numerous occasions.","zh":"她已经多次证明了自己的价值。"},{"en":"Online retailers, once rare, are now numerous.","zh":"网络零售商从前很少见，但现在已经遍地开花。"}],"forms":["base"]},{"id":73,"word":"excitement","gloss":"兴奋，激动","unit":"B2U2","examples":[{"en":"The whole nation is filled with excitement for its first aircraft carrier.","zh":"举国上下为拥有第一艘航空母舰而兴奋不已。"},{"en":"I can't say I slept well, for the excitement of the previous day made me very wakeful.","zh":"我说不上睡得好，因为前一天发生的激动人心的事情使我很难入睡。"}],"forms":["base"]},{"id":74,"word":"recur","gloss":"再来；再发生","unit":"B2U2","examples":[{"en":"The theme of love recurred in many of his books.","zh":"他许多书里都有爱情主题。"},{"en":"The school authorities warn the student that he will be expelled if this cheating recurs.","zh":"校方警告该生，再次作弊将被开除。"}],"forms":["base","past","s"]},{"id":75,"word":"pass by","gloss":"经过","unit":"B2U2","examples":[{"en":"I see them pass by my house every day.","zh":"我每天看到他们经过我家。"},{"en":"Turn left after you pass by the old church in the middle of town.","zh":"经过镇中央的古老教堂后左转。"}],"forms":["base"]},{"id":76,"word":"coincide","gloss":"同时发生；一致","unit":"B2U2","examples":[{"en":"We timed our trip to coincide with my cousin's wedding.","zh":"我们把旅行的时间安排在我堂兄举行婚礼的时候。"},{"en":"The art exhibition coincides with the 50th anniversary of his death.","zh":"艺术展览的时间恰逢他逝世50周年。"},{"en":"Her views coincide with his on most subjects.","zh":"在大多数问题上她与他观点一致。"},{"en":"The kids' views on life don't always coincide, but they're not afraid of voicing their opinions.","zh":"孩子们对生活的看法不尽相同，但他们敢于发表自己的看法。"}],"forms":["base","s"]},{"id":77,"word":"on the other hand","gloss":"另一方面","unit":"B2U2","examples":[{"en":"On the one hand, I think the price is fair, but on the other hand, I really can't afford to spend that much money.","zh":"一方面，我觉得价格合理，但另一方面，我确实付不起那么多钱。"},{"en":"He's a good guy. His brother, on the other hand, is a very selfish man.","zh":"他是个棒小伙，但是他哥哥是个非常自私的人。"}],"forms":["base"]},{"id":78,"word":"work out","gloss":"锻炼身体","unit":"B2U2","examples":[{"en":"I plan to work out twice a week.","zh":"我计划每周锻炼两次。"},{"en":"Your BMI (body mass index) is high for your age. Time to get up and work out.","zh":"在你这个年龄，你的身体质量指数过高了。该锻炼锻炼了。"}],"forms":["base"]},{"id":79,"word":"alternate","gloss":"间隔的；轮流的","unit":"B2U2","examples":[{"en":"We spend alternate Sundays with my husband's parents.","zh":"我们隔周和我公公婆婆一起过周日。"},{"en":"Private cars are banned from the city on alternate days.","zh":"该市私家车限隔日出行。"}],"forms":["base"]},{"id":80,"word":"dedication","gloss":"奉献，献身","unit":"B2U2","examples":[{"en":"The job requires a lot of enthusiasm and dedication.","zh":"这项工作需要高度的热情和奉献精神。"},{"en":"The manager thanked his staff for their dedication and passion.","zh":"经理感谢员工们的奉献精神和工作热情。"}],"forms":["base"]},{"id":81,"word":"determination","gloss":"决心；毅力","unit":"B2U2","examples":[{"en":"I really admire her determination to succeed.","zh":"我由衷钦佩她获得成功的决心。"},{"en":"Everyone concerned acted with determination and courage.","zh":"每个相关的人都表现出极大的毅力和勇气。"}],"forms":["base"]},{"id":82,"word":"on one/two/several occasion(s)","gloss":"有一（两、几）次","unit":"B2U2","examples":[{"en":"On several occasions, I attempted to talk with my parents about taking a part-time job, but my mother instantly interrupted me by asking me questions about my studies.","zh":"有几次我试图和父母讨论打零工的事情，但母亲马上打断我，问我一些关于学习的问题。"},{"en":"He drinks far too much. On one occasion I saw him drink a whole bottle of vodka.","zh":"他喝酒实在太多。有一次我看到他喝了整整一瓶伏特加。"}],"forms":["base"]},{"id":83,"word":"reward","gloss":"报答；报偿","unit":"B2U2","examples":[{"en":"There's a reward for whoever finds our pet dog.","zh":"无论谁找到我们的宠物狗都会得到一份酬金。"},{"en":"Good leaders will provide rewards and thanks to staff members.","zh":"好的领导会奖励和感谢员工。"}],"forms":["base","s"]},{"id":84,"word":"vain","gloss":"虚荣的，自负的","unit":"B2U2","examples":[{"en":"Too much praise can make a person vain.","zh":"过多的表扬会使人自负。"},{"en":"She was vain of/about her appearance.","zh":"她很自恋，认为自己长得漂亮。"}],"forms":["base"]},{"id":85,"word":"competitor","gloss":"竞争者，对手","unit":"B2U2","examples":[{"en":"Mike is a tough competitor and will probably do very well in business.","zh":"迈克是位很坚强的竞争对手，生意可能会做得很好。"},{"en":"More than 100 competitors took part in the race.","zh":"100多位选手参加了比赛。"}],"forms":["base","s"]},{"id":86,"word":"emotion","gloss":"激情，感情，情绪","unit":"B2U2","examples":[{"en":"Love, joy, hate, fear and jealousy are all emotions.","zh":"爱、喜悦、仇恨、恐惧和嫉妒都是一种情绪。"},{"en":"Jack is a man of great emotion, easily given to tears.","zh":"杰克是个性情中人，很容易流泪。"},{"en":"His voice was full of emotion as he told us the story of his cherished mother.","zh":"他给我们讲他挚爱的母亲的故事时声音充满感情。"}],"forms":["base","s"]},{"id":87,"word":"startle","gloss":"使大吃一惊","unit":"B2U2","examples":[{"en":"You startled me — I didn't hear you come in.","zh":"你吓到我了——我没有听见你进来。"},{"en":"He was concentrating on his homework and her voice startled him.","zh":"他正在聚精会神地做作业，被她的声音吓了一跳。"}],"forms":["base","past"]},{"id":88,"word":"intensity","gloss":"紧张，强烈","unit":"B2U2","examples":[{"en":"In order to finish the job in time, we have to work with greater intensity.","zh":"为了及时完成工作，我们必须更加紧张地工作。"},{"en":"The mayor didn't realize the intensity of people's feelings on the housing issue.","zh":"市长没有意识到在住房问题上民情有多强烈。"}],"forms":["base"]},{"id":89,"word":"tension","gloss":"紧张，不安","unit":"B2U2","examples":[{"en":"Smiling and laughing has been shown to relieve tension and stress.","zh":"微笑和大笑已被证明可以缓解紧张和压力。"},{"en":"We are working under great tension to meet a deadline.","zh":"我们正在极其紧张地工作，以如期完成任务。"},{"en":"Exercise is the ideal way to relieve tension after a hard day of mental work.","zh":"一天紧张的脑力劳动之后，锻炼是缓解压力最理想的办法。"}],"forms":["base"]},{"id":90,"word":"scared","gloss":"惊恐的，害怕的","unit":"B2U2","examples":[{"en":"I've always been scared of dogs.","zh":"我历来怕狗。"},{"en":"I wanted to ask her for help, but was scared that she might refuse.","zh":"我想请她帮忙，但怕她拒绝。"}],"forms":["base"]},{"id":91,"word":"stretch out","gloss":"伸展","unit":"B2U2","examples":[{"en":"Feel free to stretch yourself out on the couch.","zh":"你可以随意一点在长沙发上舒舒服服躺下。"},{"en":"She stretched out her hand and helped the old man stand up from his chair.","zh":"她伸手将老人从椅子上扶起来。"}],"forms":["base"]},{"id":92,"word":"bring (sb.) back to earth","gloss":"使回到现实中","unit":"B2U2","examples":[{"en":"Emily's voice brought him back to earth.","zh":"爱米丽的声音使他回到现实之中。"},{"en":"Jack had been chatting online with his friends until his parents knocked on the door and brought him back to earth.","zh":"杰克一直在网上和朋友聊天，直到父母敲门才使他回到现实之中。"},{"en":"In his mind's eye, she is still a shy girl.","zh":"在他的记忆里，她仍然是个害羞的女孩。"},{"en":"In my mind's eye, I can still see the house where I was born.","zh":"在我脑海里，我仍然能看见我出生的房子。"}],"forms":["base"]},{"id":93,"word":"hug","gloss":"拥抱","unit":"B2U2","examples":[{"en":"Steve opened the car door for her, hugged her as she got out, and they went up to her flat, his arm round her shoulders.","zh":"史蒂夫为她打开车门，她下车后与她拥抱，然后他的手臂搂着她的肩膀，一起上楼到她的寓所。"},{"en":"Mary hugged her teddy bear tightly to her chest.","zh":"玛丽把她的玩具熊紧紧抱在胸前。"}],"forms":["base","past"]},{"id":94,"word":"surround","gloss":"围绕，包围","unit":"B2U2","examples":[{"en":"The house is surrounded by trees, so it cannot be seen from any other buildings.","zh":"这栋房子四周树木环绕，所以从其他建筑根本看不到它。"},{"en":"She sat in an armchair, surrounded by her 12 cats.","zh":"她坐在扶手椅上，12只猫围着她。"}],"forms":["base","past"]},{"id":95,"word":"congratulate","gloss":"祝贺；庆贺","unit":"B2U2","examples":[{"en":"It is my wife you should be congratulating — she did all the hard work.","zh":"你应该祝贺我夫人——是她完成了所有艰巨的工作。"},{"en":"His teachers congratulated him on winning the first prize in the speech contest.","zh":"老师们祝贺他在演讲比赛中获得一等奖。"}],"forms":["base","ing","past"]},{"id":96,"word":"accomplishment","gloss":"成就","unit":"B2U2","examples":[{"en":"The discovery of antibiotics is one of the great accomplishments of modern medicine.","zh":"发现抗生素是现代医学最伟大的成就之一。"},{"en":"His colleagues congratulated him on his wonderful accomplishment and wished him continued success in the future.","zh":"他的同事祝贺他取得了出色的成就，并希望他在未来继续获得成功。"}],"forms":["base","s"]},{"id":97,"word":"media","gloss":"大众传播媒介","unit":"B2U2","examples":[{"en":"Much of what children learn comes directly from the mass media.","zh":"孩子们学到的东西很多直接来自大众传媒。"},{"en":"In my opinion, the main responsibility of the media is to tell the truth.","zh":"我认为媒体的主要责任是告知真相。"}],"forms":["base"]},{"id":98,"word":"system","gloss":"系统","unit":"B2U3","examples":[{"en":"The computer system has broken down. I can't send email messages until it is fixed.","zh":"计算机系统坏了，在修好之前我发不了电子邮件。"},{"en":"How many planets are there in the solar system?","zh":"太阳系有多少颗行星？"}],"forms":["base"]},{"id":99,"word":"throughout","gloss":"自始至终；到处","unit":"B2U3","examples":[{"en":"It rained throughout the night.","zh":"下了一整夜雨。"},{"en":"Carpet has been fitted throughout the house.","zh":"这栋房子全部铺设了地毯。"}],"forms":["base"]},{"id":100,"word":"favorite","gloss":"中意的，特别喜爱的","unit":"B2U3","examples":[{"en":"Charles Dickens is John's favorite English author.","zh":"查尔斯·狄更斯是约翰最喜爱的英国作者。"},{"en":"He celebrated the publication of his novel by opening a bottle of his favorite champagne.","zh":"他打开了一瓶他最喜欢的香槟酒庆祝他的小说出版。"},{"en":"My younger sister, being a lot more sensible than I, is my parents' favorite.","zh":"我妹妹比我懂事得多，最受我爸妈宠爱。"},{"en":"The song is still a favorite after 20 years.","zh":"这首歌唱了20年还是人们最喜爱的一首。"}],"forms":["base"]},{"id":101,"word":"wander","gloss":"漫步，漫游","unit":"B2U3","examples":[{"en":"She wandered far away from her home alone, and got lost in the woods.","zh":"她独自离家乱逛，走得很远，后来在树林里迷了路。"},{"en":"A strange animal wandered into the backyard of the house this morning, and the kids called the police.","zh":"一只奇怪的动物今天上午遛到了屋子的后院，孩子们打电话报了警。"}],"forms":["base","past"]},{"id":102,"word":"scan","gloss":"浏览；细看","unit":"B2U3","examples":[{"en":"She scanned the list to find her name.","zh":"她在名单上找自己的名字。"},{"en":"She scanned his face for any clue to what he was thinking.","zh":"她扫了他的面孔一眼，想发现点线索，知道他在想什么。"},{"en":"The waitress still hasn't taken our order — we just can't catch her eye.","zh":"女服务员还没过来给我们点菜，她就是不朝我们这里看。"},{"en":"The new store opened with a big sign that caught the eye of everyone walking down the street.","zh":"新店开张时挂出了大招牌，吸引了每个过路人的眼球。"}],"forms":["base","past"]},{"id":103,"word":"guarantee","gloss":"承诺，保证","unit":"B2U3","examples":[{"en":"He guaranteed us that everything would go according to plan.","zh":"他向我们保证，一切将按计划进行。"},{"en":"Money doesn't guarantee a happy life.","zh":"金钱并不能保证人生幸福。"}],"forms":["base","past"]},{"id":104,"word":"stack","gloss":"叠放","unit":"B2U3","examples":[{"en":"The boy spent a whole afternoon splitting and stacking firewood.","zh":"男孩一整个下午都在劈柴垛柴。"},{"en":"Stacking all the dishes in the dishwasher will take a while.","zh":"把所有碗碟放入洗碗机是要点时间的。"},{"en":"Stacks of books were piled up on the desk.","zh":"书桌上堆满了一叠叠的书。"},{"en":"We've got a stack of bills to pay.","zh":"我们有一大叠账单要付。"}],"forms":["base","ing","s"]},{"id":105,"word":"stick to","gloss":"粘住","unit":"B2U3","examples":[{"en":"The boy sticks to his mother like glue. It's not normal.","zh":"这男孩整天离不开他妈，这不正常。"},{"en":"Someone interrupted his speech and told him to stick to his point.","zh":"有人打断他的讲话，让他别跑题。"}],"forms":["base"]},{"id":106,"word":"anticipate","gloss":"期待","unit":"B2U3","examples":[{"en":"The organizers of the sports meet anticipate a large crowd of spectators.","zh":"运动会的组织者预期会有很多观众。"},{"en":"Tracy did not anticipate having to pay for the ticket.","zh":"翠西没料到要自己掏钱买票。"}],"forms":["base"]},{"id":107,"word":"pace","gloss":"规定…速率；调整生活和活动节奏","unit":"B2U3","examples":[{"en":"This is a well-paced, well-acted play.","zh":"这部剧目剧情发展的节奏把握得很好，演员表演也很到位。"},{"en":"In the long distance race, it is very important for one to pace oneself.","zh":"在长跑比赛中，控制速度是很重要的。"}],"forms":["base","past"]},{"id":108,"word":"charm","gloss":"吸引，使陶醉","unit":"B2U3","examples":[{"en":"The band charmed its hometown with an excellent performance last night.","zh":"昨晚乐队的精彩表演让家乡父老沉醉不已。"},{"en":"The guests were all charmed by their hospitality.","zh":"他们的热情款待令来客无比愉悦。"}],"forms":["base","past"]},{"id":109,"word":"profession","gloss":"职业","unit":"B2U3","examples":[{"en":"The doctor talked to students who are thinking about entering the medical profession.","zh":"医生跟考虑进入医学专业的学生聊了聊。"},{"en":"I am a teacher by profession.","zh":"我的职业是教师。"}],"forms":["base"]},{"id":110,"word":"for a moment","gloss":"片刻，一会儿","unit":"B2U3","examples":[{"en":"His harsh words struck me so hard that for a moment I was speechless.","zh":"他的严厉措辞让我一时哑口无言。"},{"en":"For a moment he just stood there, unable to understand what had happened.","zh":"一时间他呆呆地站在那里，弄不清到底发生了什么。"}],"forms":["base"]},{"id":111,"word":"amaze","gloss":"使惊奇","unit":"B2U3","examples":[{"en":"You've done all your homework in an hour? You amaze me.","zh":"你一小时就做完了所有作业？你真让我吃惊。"},{"en":"The visitors were all amazed at how well the pupils could read and write.","zh":"小学生们能读善写，让所有来访者吃惊。"}],"forms":["base","past"]},{"id":112,"word":"by oneself","gloss":"独自，单独地","unit":"B2U3","examples":[{"en":"I'm amazed you managed to move those boxes all by yourself.","zh":"你居然一人搬了那些箱子，我很吃惊。"},{"en":"I had to do the whole job all by myself.","zh":"这个任务从头到底我得一人完成。"}],"forms":["base"]},{"id":113,"word":"now and then","gloss":"偶尔，有时","unit":"B2U3","examples":[{"en":"She sat by the window, looking out now and then to see if the guests were coming.","zh":"她坐在窗边，不时向外看看客人来了没有。"},{"en":"\"How often do you go to the theatre?\" \"Now and then. Not often.\"","zh":"\"你们隔多长时间去剧院看演出？\"\"偶尔去去，不经常。\""}],"forms":["base"]},{"id":114,"word":"magnificent","gloss":"壮丽的","unit":"B2U3","examples":[{"en":"The view from the top of the mountain is magnificent.","zh":"从山顶望去，景色壮观。"},{"en":"They gave a magnificent performance.","zh":"他们作了一场精彩的演出。"}],"forms":["base"]},{"id":115,"word":"be big on","gloss":"对…热心；偏爱…","unit":"B2U3","examples":[{"en":"My roommate loves singing and dancing and is big on theatre.","zh":"我的室友喜欢唱歌跳舞，对戏剧也很热衷。"},{"en":"I am not very big on computer games.","zh":"我不太喜欢电脑游戏。"}],"forms":["base"]},{"id":116,"word":"the hard way","gloss":"以吃力的方式或高昂的代价","unit":"B2U3","examples":[{"en":"I learned the hard way not to trust door-to-door salesmen.","zh":"我吃了苦头才知道上门推销者不能相信。"},{"en":"He learned the hard way that it is not easy to work one's way through college.","zh":"靠自己打工完成大学学业并非易事，他对此深有体会。"}],"forms":["base"]},{"id":117,"word":"obtain","gloss":"获得","unit":"B2U3","examples":[{"en":"The information you want is difficult to obtain.","zh":"你要的信息很难得到。"},{"en":"You need to obtain permission from the head librarian to check out a newly arrived book.","zh":"借新书你得经图书馆长许可。"}],"forms":["base"]},{"id":118,"word":"back and forth","gloss":"来来回回地","unit":"B2U3","examples":[{"en":"The two boys are throwing the basketball back and forth between them.","zh":"两个男孩把篮球扔来扔去。"},{"en":"The tiger paced back and forth in its cage.","zh":"老虎在笼子里走来走去。"}],"forms":["base"]},{"id":119,"word":"not give a second thought/without a second thought","gloss":"不再考虑；不担心，不在乎","unit":"B2U3","examples":[{"en":"When an opportunity this good comes along, you don't give it a second thought — you take it before it slips away.","zh":"当这么好的机会出现的时候，你不用多想——抓住它，别错过。"},{"en":"When he finds a book worth reading, he pays for it without a second thought.","zh":"只要是他觉得值得看的书，他就会毫不犹豫地掏钱买下。"},{"en":"The matter didn't seem important, and I hardly gave it a second thought.","zh":"这事儿看上去并不重要，我几乎没有去想过。"},{"en":"We turned down their offer of help without giving it a second thought.","zh":"我们没多想就拒绝了他们提出的帮助。"}],"forms":["base"]},{"id":120,"word":"assume","gloss":"认为，想当然","unit":"B2U3","examples":[{"en":"I assumed he was coming, so I was surprised when he didn't show up.","zh":"我原以为他会来，所以他没露面让我很惊讶。"},{"en":"We'll be arriving around noon. That's assuming that our flight is on time.","zh":"我们会在正午前后到达，假定航班准点的话。"}],"forms":["base","ing","past"]},{"id":121,"word":"assignment","gloss":"作业","unit":"B2U3","examples":[{"en":"When he was an intern for a local newspaper, he got a week-long assignment: to interview the flood victims and write a report about them.","zh":"他在一家当地报纸实习时接受了一项为时一周的任务：采访水灾灾民并写出有关他们的报道。"},{"en":"What a challenging assignment it was for a young writer, to write the story of this great hero!","zh":"对一名年轻作家而言，撰写这位大英雄的故事，这是多么具有挑战性的任务啊！"}],"forms":["base"]},{"id":122,"word":"interview","gloss":"采访；面试","unit":"B2U3","examples":[{"en":"Several strong candidates have been interviewed for the position.","zh":"多个很有优势的候选人接受了面试，竞争这个职位。"},{"en":"The Minister of Culture was interviewed on television.","zh":"文化部长接受了电视采访。"},{"en":"The new mayor set out to turn the town on its head, but after one month, it was business as usual.","zh":"新市长开始把小城闹个天翻地覆，但一个月后，一切又都是老一套了。"},{"en":"The new finding has turned the accepted theory on its head.","zh":"新的发现颠覆了已被接受的理论。"}],"forms":["base","past"]},{"id":123,"word":"take in","gloss":"看；领会；记住","unit":"B2U3","examples":[{"en":"It was an interesting exhibition, but there was too much to take in during the half-hour short visit.","zh":"展览很有趣，只是展品太多，半小时短暂的参观看不了多少。"},{"en":"He was in a big hurry and didn't have time to take in the view.","zh":"他匆匆忙忙，没时间仔细欣赏景色。"}],"forms":["base"]},{"id":124,"word":"recognition","gloss":"认出，识别","unit":"B2U3","examples":[{"en":"The police captured the man by using a face recognition system.","zh":"警察用人脸识别设备逮住了这名男子。"},{"en":"The moment she saw me, she nodded to me and gave me a faint smile of recognition.","zh":"她见了我，就朝我点点头，微微一笑表示认识我。"}],"forms":["base"]},{"id":125,"word":"steady","gloss":"持续的，平稳的","unit":"B2U3","examples":[{"en":"Steady rain arrives for Sunday.","zh":"星期天将迎来持续降雨。"},{"en":"If you read aloud the poem, you will catch its steady rhythm.","zh":"你放声朗读这首诗，就会捕捉到它均衡的节奏。"}],"forms":["base"]},{"id":126,"word":"narrative","gloss":"故事","unit":"B2U3","examples":[{"en":"The novel is a first-person narrative. But it is not a story about the author.","zh":"小说是用第一人称写的，但讲的不是作者自身的故事。"},{"en":"He has given a detailed narrative of the event.","zh":"他对这件事做了详细的叙述。"}],"forms":["base"]},{"id":127,"word":"glimpse","gloss":"瞥见；看一眼","unit":"B2U3","examples":[{"en":"The police officer glimpsed him as he drove by in his car.","zh":"他开车经过时，警官朝他瞥了一眼。"},{"en":"He just glimpsed at the photo and then turned his attention elsewhere.","zh":"他只看了照片一眼，就去关注别的事儿了。"},{"en":"Some of the fans had waited 24 hours outside the hotel to catch a glimpse of the singer.","zh":"有一些粉丝在宾馆外面等了24小时，以期一睹歌手的风采。"},{"en":"I got a glimpse of their happy faces as they passed.","zh":"他们经过时，我瞥见了他们开心的笑脸。"}],"forms":["base","past"]},{"id":128,"word":"commitment","gloss":"投入；承诺","unit":"B2U4","examples":[{"en":"A career as an actor requires one hundred percent commitment.","zh":"干演员这一行需要百分之百的投入。"},{"en":"The company's commitment to providing quality products at a reasonable price has been vital to its success.","zh":"这家公司保证供货质优价廉的承诺是它成功的关键。"}],"forms":["base"]},{"id":129,"word":"sign (sb.) up (for sth.)","gloss":"报名（让某人）参加","unit":"B2U4","examples":[{"en":"She's signed up for evening classes at the community college.","zh":"她已经报名参加社区学院夜间课程的学习。"},{"en":"I've signed up to make the sandwiches for the party.","zh":"我已报名为聚会做三明治。"}],"forms":["base"]},{"id":130,"word":"each and every","gloss":"用于强调）每一个","unit":"B2U4","examples":[{"en":"Each and every one of the flowers has its own color and smell.","zh":"每一朵花的色彩和气味都各不相同。"},{"en":"The company will continue to provide a wide range of products from small to large machines in order to suit each and every customer need.","zh":"公司将继续致力于从小型到大型机器的产品多样化，以满足每一位客户的需要。"}],"forms":["base"]},{"id":131,"word":"definitely","gloss":"肯定，毫无疑问","unit":"B2U4","examples":[{"en":"I'm definitely going to get in touch with my former comrades-in-arms.","zh":"我肯定要与我以前的战友取得联系。"},{"en":"\"Was it what you expected?\" \"Yes, definitely.\"","zh":"\"那是你所期待的吗？\"\"当然是。\""}],"forms":["base"]},{"id":132,"word":"concept","gloss":"概念；观念","unit":"B2U4","examples":[{"en":"It is very difficult to define the concept of beauty.","zh":"很难给美这个概念下一个定义。"},{"en":"He has difficulty grasping the basic concepts of mathematics.","zh":"他掌握数学的基本概念有些困难。"}],"forms":["base","s"]},{"id":133,"word":"episode","gloss":"电视连续剧的）一集；（小说的）一个事件","unit":"B2U4","examples":[{"en":"One of the funniest episodes in the book occurs in Chapter 6.","zh":"书中最有趣的事件之一发生在第六章。"},{"en":"The first episode of the first season of a TV show is also known as the \"pilot\".","zh":"电视剧的第一季第一集也被称为\"试播集\"。"}],"forms":["base","s"]},{"id":134,"word":"appreciate","gloss":"欣赏；感激","unit":"B2U4","examples":[{"en":"You can't really appreciate foreign literature in translation.","zh":"看翻译作品不能真正欣赏外国文学原著的美妙之处。"},{"en":"I would appreciate it if you could let me know in advance whether or not you will be coming.","zh":"如能提前告知能否前来，我将不胜感激。"}],"forms":["base"]},{"id":135,"word":"on a daily basis","gloss":"每一天","unit":"B2U4","examples":[{"en":"How much desktop software do you generally use on a daily basis?","zh":"你平日里常用的桌面软件有多少？"},{"en":"Safety equipment was checked on a daily basis.","zh":"安全设备每天都进行检查。"}],"forms":["base"]},{"id":136,"word":"intention","gloss":"打算；计划；意图","unit":"B2U4","examples":[{"en":"Mr. Smith has announced his intention to retire.","zh":"史密斯先生已经宣布他打算退休。"},{"en":"I have no intention of going to his wedding.","zh":"我无意去参加他的婚礼。"},{"en":"He left England with the intention of travelling to Africa.","zh":"他离开英格兰，打算去非洲旅行。"},{"en":"He's proud of his guitar style, he says, and he has every intention of showing it off.","zh":"他说他为自己弹吉他的风格感到自豪，并一心想露一手。"}],"forms":["base"]},{"id":137,"word":"speak volumes","gloss":"不言自明","unit":"B2U4","examples":[{"en":"The crowd gathered at the entrance to the stadium spoke volumes of the soccer team's popularity.","zh":"看体育馆进口处聚集的人群，就知道这支足球队有多受欢迎。"},{"en":"How you react to challenges speaks volumes about your character.","zh":"从你应对挑战的反应就看出你的性格。"},{"en":"Sometimes nothing needs to be said. A mere glance at each other can speak volumes.","zh":"有时什么都不用说，仅仅一个眼神交汇就够了。"}],"forms":["base"]},{"id":138,"word":"frustration","gloss":"懊丧，懊恼","unit":"B2U4","examples":[{"en":"I could sense his frustration at not being able to help.","zh":"我可以感觉到他因无力帮忙而心感沮丧。"},{"en":"How could anyone watch this program without feeling anger, frustration and disgust?","zh":"看这档节目，谁不感到愤怒、懊丧和厌恶呢？"},{"en":"They hoped the waiting and the uncertainty would wear down my resistance.","zh":"他们希望这种等待和不确定性将拖垮我的抵抗。"},{"en":"Both sides are trying to wear the other down by being obstinate in the negotiations.","zh":"双方在谈判中都不肯让步，试图耗尽对方的耐性。"},{"en":"She didn't give up work when she had the baby.","zh":"她生了孩子后并未放弃工作。"},{"en":"They were forced to give up their home because they couldn't pay the mortgage.","zh":"他们因为还不起按揭被迫交出了房子。"}],"forms":["base"]},{"id":139,"word":"reputation","gloss":"名誉；名声","unit":"B2U4","examples":[{"en":"The hotel has a bad/good reputation.","zh":"这家旅馆名声很坏/好。"},{"en":"Steve soon acquired a reputation as a first-class cook.","zh":"史蒂夫不久就获得了顶级厨师的名声。"},{"en":"His reputation was destroyed when he was caught committing plagiarism in his thesis.","zh":"他论文抄袭被人发现，这使他声名扫地。"}],"forms":["base"]},{"id":140,"word":"let alone","gloss":"更不用说","unit":"B2U4","examples":[{"en":"Some people never even read a newspaper, let alone a book.","zh":"有些人从不看报纸，更不用说读书了。"},{"en":"Her legs were so crippled that it seemed impossible for her to be able to walk, let alone run a marathon.","zh":"她腿部残疾，似乎走路都不可能，更别说跑马拉松了。"}],"forms":["base"]},{"id":141,"word":"evident","gloss":"清楚的；显而易见的","unit":"B2U4","examples":[{"en":"Her love for him was evident in all that she did.","zh":"她所做的一切都清楚地表明她爱他。"},{"en":"From the smell it was evident that the drains had been blocked for several days.","zh":"散发出的气味表明下水道显然已经被堵好几天了。"}],"forms":["base"]},{"id":142,"word":"essence","gloss":"本质；精髓","unit":"B2U4","examples":[{"en":"Yet change is the very essence of life.","zh":"然而变迁恰恰是人生的本质。"},{"en":"The essence of his argument was that education should continue throughout life.","zh":"他观点的要旨是教育应该持续终生。"}],"forms":["base"]},{"id":143,"word":"exceed","gloss":"超过；超越","unit":"B2U4","examples":[{"en":"The final cost should not exceed $5,000.","zh":"最终的花费不应超出5,000美元。"},{"en":"You're fined 200 yuan for exceeding the speed limit.","zh":"你超速行驶，罚款200元。"}],"forms":["base","ing"]},{"id":144,"word":"incredible","gloss":"难以置信的","unit":"B2U4","examples":[{"en":"The mountain view is just incredible.","zh":"这山景色美妙至极。"},{"en":"It's incredible how much Tom has changed since he met Sally.","zh":"自从遇见萨丽后，汤姆的变化之大简直令人难以置信。"},{"en":"Her performance has taken the critics by storm.","zh":"她的表演完全征服了评论界。"},{"en":"The new show took London by storm.","zh":"这部新剧在伦敦大获成功。"}],"forms":["base"]},{"id":145,"word":"multiple","gloss":"多个的；多种多样的","unit":"B2U4","examples":[{"en":"We've made multiple copies of the report.","zh":"我们把报告复印了多份。"},{"en":"We're now used to accessing information through multiple channels.","zh":"我们现在习惯于从不同渠道获取信息。"}],"forms":["base"]},{"id":146,"word":"register","gloss":"登记，注册","unit":"B2U4","examples":[{"en":"Within two weeks of arrival all foreigners had to register with the local police.","zh":"所有外国人在到达后两周内必须在当地警察局登记。"},{"en":"How many students have registered for English classes?","zh":"有多少学生登记选修英语课了？"},{"en":"The police subjected him to hours of questioning.","zh":"警察对他进行了长时间的盘问。"},{"en":"The city was subjected to heavy bombing.","zh":"那座城市遭受了猛烈轰炸。"}],"forms":["base","past"]},{"id":147,"word":"productive","gloss":"富有成效的；多产的","unit":"B2U4","examples":[{"en":"Most of us are more productive in the morning.","zh":"我们大多数人早上效率较高。"},{"en":"He had an amazingly productive five years in which he managed to write four novels.","zh":"五年内他写了四部小说，如此多产真让人难以置信。"}],"forms":["base"]},{"id":148,"word":"evolve","gloss":"使）逐步发展；（使）逐步演变","unit":"B2U4","examples":[{"en":"Did humans evolve from apes?","zh":"人类是由猿进化而来的吗？"},{"en":"The company has evolved into a major chemical manufacturer.","zh":"这家公司已逐步发展成一个大型的化工厂。"},{"en":"Cats have evolved an extraordinary sense of balance.","zh":"猫逐渐演化出非凡的平衡官能。"}],"forms":["base","past"]},{"id":149,"word":"and so forth","gloss":"等等","unit":"B2U4","examples":[{"en":"We discussed almost everything — when to go, what to see and so forth.","zh":"我们几乎什么都商量过了——什么时候走、看什么等等。"},{"en":"Any scientist would say that evolution is a theory, just as gravity, general relativity, the Big Bang, and so forth are theories.","zh":"任何科学家都认为进化论是一个理论，就像万有引力、广义相对论、大爆炸论等等。"}],"forms":["base"]},{"id":150,"word":"route","gloss":"路线；途径","unit":"B2U4","examples":[{"en":"Which is the best route to take?","zh":"哪一条是最佳路线？"},{"en":"A college education is often the best route to a good job.","zh":"大学教育常常是获得一份好工作的最佳途径。"}],"forms":["base"]},{"id":151,"word":"thrive","gloss":"茁壮成长；兴旺，繁荣","unit":"B2U4","examples":[{"en":"New businesses thrive in this area.","zh":"新商家在这一地区蓬勃兴起。"},{"en":"Revolutions in technology bring benefits to millions, but the companies that make them happen do not always thrive.","zh":"技术上的革新总是给数百万人带来好处，但是那些实现技术革新的公司却不一定能因此而兴旺发达。"}],"forms":["base"]},{"id":152,"word":"thanks to","gloss":"幸亏；由于，因为","unit":"B2U4","examples":[{"en":"It was all a great success — thanks to a lot of hard work.","zh":"由于尽心竭力，这才大获成功。"},{"en":"We've reached our goal of $10,000, thanks to the generosity of the public.","zh":"我们完成了募集10,000美元的目标，这要归功于公众的慷慨解囊。"},{"en":"Some ski resorts opened early, thanks to a late October snowstorm.","zh":"一些滑雪胜地提前开放了，这多亏十月末的一场暴风雪。"}],"forms":["base"]},{"id":153,"word":"personality","gloss":"人格，个性","unit":"B2U4","examples":[{"en":"Henry, who has a kind, friendly personality, is well qualified for the job.","zh":"亨利和蔼友善，非常胜任这份工作。"},{"en":"Despite their different personalities, they became the best of friends.","zh":"尽管个性不同，他们还是成了最好的朋友。"}],"forms":["base","s"]},{"id":154,"word":"controversy","gloss":"争论；争议","unit":"B2U5","examples":[{"en":"Much controversy arose regarding the author's newly published book.","zh":"关于这位作者新出版的书，出现了许多争议。"},{"en":"There is a fierce/bitter/heated controversy over tax cuts for big businesses.","zh":"大企业减税一事引起了激烈的争论。"}],"forms":["base"]},{"id":155,"word":"explore","gloss":"探究，探索","unit":"B2U5","examples":[{"en":"The engineers have already explored the possibility of building a bridge over the river.","zh":"工程师们早已研究了在这条河上造桥的可能性。"},{"en":"Virtual Reality aims to give us artificial worlds to explore, outside normal space and time.","zh":"虚拟现实旨在给我们一个正常空间和时间之外的虚拟世界去探索。"}],"forms":["base","past"]},{"id":156,"word":"researcher","gloss":"","unit":"B2U5","examples":[{"en":"I work as a researcher at the National Institute of Medical Research.","zh":"我在国家医学研究所当研究员。"},{"en":"A team of researchers at MIT has designed one of the strongest lightweight materials.","zh":"麻省理工学院的一支研究团队设计出了一种最结实的轻型材料。"}],"forms":["base","s"]},{"id":157,"word":"encounter","gloss":"遇到，遭遇","unit":"B2U5","examples":[{"en":"She encountered an old friend in the street.","zh":"她在街上碰到了一位老朋友。"},{"en":"Before they had gone very far, they encountered an art student doing a sketch of the landscape.","zh":"他们没走多远就遇见了一位艺术系的学生在画风景写生。"}],"forms":["base","past"]},{"id":158,"word":"reveal","gloss":"展示；揭露","unit":"B2U5","examples":[{"en":"The details of the new policy for medical insurance have not yet been revealed.","zh":"有关医疗保险新政的细节还没有披露。"},{"en":"A new survey has revealed that a growing number of children in cities are overweight.","zh":"一项新的调查显示，越来越多的城市孩子体重超标。"}],"forms":["base","past"]},{"id":159,"word":"dominant","gloss":"统治的；占优势的","unit":"B2U5","examples":[{"en":"Charlie Chaplin was once a dominant figure in the American movie industry.","zh":"查理·卓别林曾是美国电影产业界的风云人物。"},{"en":"The company has achieved a dominant position in the world market.","zh":"这家公司在国际市场上已占据举足轻重的地位。"}],"forms":["base"]},{"id":160,"word":"only to","gloss":"结果却，不料","unit":"B2U5","examples":[{"en":"He hurried to the railway station, only to find that the train had left.","zh":"他急急忙忙赶到火车站，但却发现火车已经开走了。"},{"en":"He had once tried inviting her out, only to meet with a rather cool response.","zh":"他曾经试着邀请她出去玩，但却遭到了非常冷漠的回应。"}],"forms":["base"]},{"id":161,"word":"negotiate","gloss":"谈判，协商","unit":"B2U5","examples":[{"en":"There were reports that the three companies were negotiating to share the market.","zh":"据报道这三家公司正在协商如何分享市场。"},{"en":"The government refused to negotiate with terrorists.","zh":"政府拒绝同恐怖分子进行谈判。"}],"forms":["base","ing"]},{"id":162,"word":"maintain","gloss":"维持；保持","unit":"B2U5","examples":[{"en":"The hotel staff showed determination to maintain a high-quality service.","zh":"这家酒店的员工展现了坚持高品质服务的决心。"},{"en":"Our department maintains close contacts with the IT industry.","zh":"我们的部门同信息技术行业保持着紧密联系。"}],"forms":["base","s"]},{"id":163,"word":"relieve","gloss":"解除（某人）（痛苦、焦虑等）；减轻（痛苦、焦虑等）","unit":"B2U5","examples":[{"en":"Taking a part-time job would help relieve you of the financial burden.","zh":"找一份兼职工作能帮助你缓解经济上的负担。"},{"en":"Drugs can relieve much of the pain.","zh":"药物能在很大程度上舒缓疼痛。"}],"forms":["base"]},{"id":164,"word":"undertake","gloss":"着手做，从事；承担（任务等）","unit":"B2U5","examples":[{"en":"The United Nations is supposed to undertake the role of global peace-keeper.","zh":"联合国应该承担起维护全球和平的使命。"},{"en":"We'll have to employ more staff if we are going to undertake more work.","zh":"如果我们要承担更多的任务，那就必须雇佣更多的员工。"}],"forms":["base"]},{"id":165,"word":"figure out","gloss":"理解；推断出","unit":"B2U5","examples":[{"en":"I can't figure out why he quit his well-paid job to undertake such tedious work.","zh":"我不明白他为什么放弃高薪职位去做如此单调的工作。"},{"en":"It took me two hours to figure out how to start the new washing-machine.","zh":"我花了两小时才研究出如何启动这台新洗衣机。"}],"forms":["base"]},{"id":166,"word":"switch","gloss":"转换，变换","unit":"B2U5","examples":[{"en":"He used to play tennis, but now he's switched to golf.","zh":"他以前打网球，但是现在改打高尔夫了。"},{"en":"She started studying medicine at college, but switched to business studies in her second year.","zh":"刚进大学时她读的是医学，但是第二年转入商科。"}],"forms":["base","past"]},{"id":167,"word":"cooperate","gloss":"合作，协作","unit":"B2U5","examples":[{"en":"The New York City police cooperated with the force in Boston in catching the criminals.","zh":"纽约的警察同波士顿的警力携手抓捕罪犯。"},{"en":"Aid agencies and the local government are cooperating to deliver supplies to the flooded areas.","zh":"援助机构和当地政府正协力向洪涝灾区运送物资。"},{"en":"It would be in your interests to undertake this task, although it is difficult.","zh":"承担这项任务将对你有利，尽管它有难度。"},{"en":"The local government has refused to approve the construction of a new chemical plant because it is not in the public interest.","zh":"当地政府拒绝批准建造一座新化工厂，因为它不符合公众的利益。"}],"forms":["base","ing","past"]},{"id":168,"word":"go far","gloss":"帮助很大","unit":"B2U5","examples":[{"en":"Your suggestion will go far towards solving our present housing problem.","zh":"你的建议能极大地帮助我们解决目前的住房问题。"},{"en":"Your gift will go far towards helping to build the children's hospital.","zh":"您的馈赠将会对儿童医院的建造很有帮助。"},{"en":"Jane's a very talented writer — she'll go far.","zh":"简是一位才华横溢的作家——她前途无量。"},{"en":"Everyone was sure that this boy would go far.","zh":"人人都相信这个男孩将来会很有出息。"}],"forms":["base"]},{"id":169,"word":"assess","gloss":"评估，估量","unit":"B2U5","examples":[{"en":"The value of the diamond was assessed at $20,000.","zh":"这块钻石的估价为20,000美元。"},{"en":"Examinations are not the only means of assessing one's ability.","zh":"考试不是评估个人能力的唯一手段。"}],"forms":["base","ing","past"]},{"id":170,"word":"judgment","gloss":"判断；意见，看法","unit":"B2U5","examples":[{"en":"In your judgment, what has caused the student's failure in the examination?","zh":"你觉得是什么导致了这位学生考试不及格？"},{"en":"My judgment is that the student has spent too much time on extracurricular activities.","zh":"依我看，这位学生在课外活动上花的时间太多了。"}],"forms":["base"]},{"id":171,"word":"at first","gloss":"起先","unit":"B2U5","examples":[{"en":"At first I thought that the shop was empty, then a man appeared from behind one of the counters.","zh":"起先我以为店里没人，但后来一位男子从一个柜台后面走了出来。"},{"en":"Jack felt tired at first, but soon got used to the long working hours.","zh":"起初杰克感到疲惫不堪，但很快就适应了长时间的工作。"}],"forms":["base"]},{"id":172,"word":"emergency","gloss":"紧急情况；突发事件","unit":"B2U5","examples":[{"en":"In an emergency in China, call 110.","zh":"如在中国遇到突发情况，请拨打110。"},{"en":"The pilot of the aircraft was forced to make an emergency landing.","zh":"这架飞机的飞行员被迫紧急着陆。"}],"forms":["base"]},{"id":173,"word":"go wrong","gloss":"出问题，出故障","unit":"B2U5","examples":[{"en":"Everything went wrong with my computer after I installed that new program.","zh":"自从安装了那个新程序，我的电脑就开始故障百出。"},{"en":"I couldn't watch the live opening ceremony of the World Cup yesterday because my television went wrong again.","zh":"我昨天没能看世界杯开幕式的实况转播，因为我的电视机又出问题了。"}],"forms":["base"]},{"id":174,"word":"size up","gloss":"估量，判断","unit":"B2U5","examples":[{"en":"I don't like the way the sales assistants in that shop size you up as you walk through the door.","zh":"我不喜欢那家商店里的销售员们在你走进店铺时上下打量你的样子。"},{"en":"I felt insulted by the way my father sized up my boyfriend.","zh":"我父亲对于我男友的评价让我倍感受辱。"}],"forms":["base"]},{"id":175,"word":"within reach (of sth.)","gloss":"伸手可及；靠近","unit":"B2U5","examples":[{"en":"These hotels are within reach of beaches.","zh":"这些宾馆离海滩很近。"},{"en":"The apartment building is within easy reach of schools and sports facilities.","zh":"这幢公寓大楼离学校和运动设施都很近。"}],"forms":["base"]},{"id":176,"word":"evidence","gloss":"证据；迹象","unit":"B2U5","examples":[{"en":"There is a lot of evidence that stress is partly responsible for diseases.","zh":"有很多证据表明压力是导致疾病的原因之一。"},{"en":"Scientists haven't yet found any evidence of life on other planets.","zh":"科学家们至今还没有发现其他行星上存在生命的证据。"}],"forms":["base"]},{"id":177,"word":"deceive","gloss":"欺骗","unit":"B2U5","examples":[{"en":"You deceived me, and I can't forgive you.","zh":"你欺骗了我，我不能原谅你。"},{"en":"They deceived the old man into signing the papers.","zh":"他们哄骗那位老人签署了这些文件。"}],"forms":["base","past"]},{"id":178,"word":"gaze","gloss":"凝视，注视","unit":"B2U5","examples":[{"en":"Mike fixed his gaze on me and then smiled.","zh":"迈克盯着我看，然后露出了笑容。"},{"en":"I didn't dare to meet his gaze.","zh":"我不敢正视他的目光。"},{"en":"David sighed and gazed into the distance.","zh":"大卫叹了一口气，然后凝视远方。"},{"en":"The children gazed at all the skyscrapers in awe.","zh":"孩子们目不转睛地望着这些摩天大厦，惊叹不已。"}],"forms":["base","past"]},{"id":179,"word":"give in","gloss":"让步；屈服","unit":"B2U5","examples":[{"en":"The authorities showed no signs of giving in to the kidnappers' demands.","zh":"当局没有表现出向绑架者妥协并满足其要求的意向。"},{"en":"Students pressed university authorities until they finally gave in and installed air conditioning in the dorms.","zh":"在学生的再三要求下，校方终于让步，在学生宿舍里安装了空调。"}],"forms":["base"]},{"id":180,"word":"underneath","gloss":"在（…）下面，在（…）底下","unit":"B2U5","examples":[{"en":"The bomb exploded underneath his car as he was preparing to leave home.","zh":"当他正准备离开家时，他车底下的炸弹爆炸了。"},{"en":"Russel wore a white vest underneath his shirt.","zh":"罗素在衬衫里面穿了一件白色背心。"},{"en":"You can check the actual construction of the chair by looking underneath.","zh":"你往底部看就可以检查椅子的实际结构。"}],"forms":["base"]},{"id":181,"word":"survive","gloss":"幸存；幸免于难","unit":"B2U5","examples":[{"en":"A few villagers were killed but most survived the earthquake.","zh":"有几位村民在地震中遇难，但大多数人都幸存了下来。"},{"en":"The baby was born with a heart problem and only survived for a few hours.","zh":"这个婴儿患有先天性心脏病，只存活了几个小时。"}],"forms":["base","past"]},{"id":182,"word":"wipe out","gloss":"消灭，消除","unit":"B2U5","examples":[{"en":"The bank agreed to wipe out their debts.","zh":"银行同意将他们的债务一笔勾销。"},{"en":"The village was wiped out by the earthquake.","zh":"地震将这座村庄夷为平地。"}],"forms":["base"]},{"id":183,"word":"horizon","gloss":"眼界，见识","unit":"B2U5","examples":[{"en":"Reading and travel can widen one's horizons.","zh":"阅读和旅行能开阔人的眼界。"},{"en":"It is hoped that the course will open up new horizons for students.","zh":"希望这门课程能为同学们开拓新的视野。"},{"en":"The sun has risen on the horizon.","zh":"太阳已从地平线升起。"},{"en":"Misty clouds appeared on the distant horizon.","zh":"云雾出现在遥远的天际。"}],"forms":["base","s"]},{"id":184,"word":"corrupt","gloss":"讹用，使（语言）变得不标准；腐蚀，贿赂","unit":"B2U6","examples":[{"en":"Most of the data on the hard drive was corrupted when the power went out.","zh":"断电的时候，存在硬盘上的大部分数据都被损毁了。"},{"en":"The culture has been corrupted by Western influences.","zh":"这里的文化遭到西方影响的腐蚀。"},{"en":"It is believed that violence on television corrupts the minds of children.","zh":"电视上的暴力被认为会毒害儿童的思想。"},{"en":"What corrupts people more: money, material items or power?","zh":"什么更使人堕落：金钱，物质还是权力？"}],"forms":["base","past","s"]},{"id":185,"word":"ban","gloss":"禁止，取缔","unit":"B2U6","examples":[{"en":"The film was banned in several countries.","zh":"这部电影在好几个国家被禁演。"},{"en":"The new law bans drivers from using hand-held phones while driving.","zh":"这一新出台的法律禁止驾车者开车时使用手机。"}],"forms":["base","past","s"]},{"id":186,"word":"desirable","gloss":"值得有的，值得做的","unit":"B2U6","examples":[{"en":"The new store is in a highly desirable location.","zh":"这家新店市口很好。"},{"en":"Of course, a diplomatic solution is always more desirable than war.","zh":"当然，通过外交谈判解决总比战争更好。"}],"forms":["base"]},{"id":187,"word":"invent","gloss":"发明","unit":"B2U6","examples":[{"en":"The World Wide Web was invented in 1989.","zh":"万维网是1989年发明的。"},{"en":"She invented an explanation for being late this morning.","zh":"她为上午迟到编造了一个理由。"}],"forms":["base","past"]},{"id":188,"word":"be supposed to do","gloss":"应该做","unit":"B2U6","examples":[{"en":"What are you doing here, Tom? You are supposed to be at school!","zh":"汤姆，你在这儿干啥？你应该在上学！"},{"en":"The contract is supposed to be made without fear or pressure.","zh":"这合同应该是在没有恐惧、没有压力的情况下签订的。"}],"forms":["base","ing"]},{"id":189,"word":"fascinating","gloss":"迷人的，有极大吸引力的","unit":"B2U6","examples":[],"forms":["base"]},{"id":190,"word":"fascinate","gloss":"使）着迷","unit":"B2U6","examples":[{"en":"The book offers a fascinating glimpse of the lives of the rich and famous.","zh":"这本书让人一瞥名人阔佬们令人陶醉的生活。"},{"en":"Phil has long been fascinated by the science and technology of space flight.","zh":"菲尔一直着迷于航天飞行的科学技术。"}],"forms":["base","ing","past"]},{"id":191,"word":"strictly speaking","gloss":"严格地讲","unit":"B2U6","examples":[{"en":"Strictly speaking, Great Britain consists of Scotland, Wales, and England, and the United Kingdom consists of Great Britain and Northern Ireland.","zh":"严格地讲，大不列颠包括苏格兰、威尔士和英格兰，而联合王国包括大不列颠和北爱尔兰。"},{"en":"Strictly speaking, a tomato is a fruit, not a vegetable.","zh":"严格地讲，西红柿是水果而不是蔬菜。"}],"forms":["base"]},{"id":192,"word":"tolerance","gloss":"容忍，宽容；忍耐","unit":"B2U6","examples":[{"en":"Your body will build up a tolerance to most drugs.","zh":"你的身体会对大多数药物产生耐药性。"},{"en":"The large number of immigrants who flood this border region is testing its tradition of tolerance.","zh":"涌入的大量移民正在考验这个边境地区包容的传统。"}],"forms":["base"]},{"id":193,"word":"extent","gloss":"范围；程度","unit":"B2U6","examples":[{"en":"The extent of damage resulting from the storm is still unknown.","zh":"风暴造成的损害，其程度尚属未知。"},{"en":"The drug reduces pain to a real extent, particularly in the short term.","zh":"这种药能极大地缓解疼痛，特别是短期止痛。"}],"forms":["base"]},{"id":194,"word":"core","gloss":"核心；果核","unit":"B2U6","examples":[{"en":"The core of the plant's workforce comes from local communities.","zh":"工厂的核心劳动力来自于本地社区。"},{"en":"Do you agree that artificial intelligence is, at its core, a human design activity?","zh":"你同意人工智能从本质上讲是一种人类设计活动的说法吗？"},{"en":"The company's core mission, claimed its CEO, is to help patients with memory loss.","zh":"公司总裁说，公司的核心使命是帮助丧失记忆的病人。"}],"forms":["base"]},{"id":195,"word":"arouse","gloss":"唤起，激起","unit":"B2U6","examples":[{"en":"News of the actor's romance has aroused a lot of curiosity.","zh":"这名男演员的风流韵事引起了人们很大的好奇。"},{"en":"Football arouses a good deal of passion among its fans.","zh":"足球往往使球迷们冲动。"}],"forms":["base","past","s"]},{"id":196,"word":"opportunity","gloss":"机会","unit":"B2U6","examples":[{"en":"His work provided him with the opportunity for a lot of foreign travel.","zh":"他的工作给予他许多到国外出差的机会。"},{"en":"The exhibition offers visitors a great opportunity to see some of the masterpieces of the Renaissance.","zh":"展览给参观者提供了一次观看文艺复兴时代巨作的好机会。"}],"forms":["base"]},{"id":197,"word":"for effect","gloss":"为了增强效果，为了引起注意","unit":"B2U6","examples":[{"en":"You don't mean that — you only said it for effect.","zh":"你不是这个意思，你那样说只是为了效果。"},{"en":"The author used some slang words just for effect.","zh":"作者使用了一些俚语，为的是增强效果。"}],"forms":["base"]},{"id":198,"word":"invade","gloss":"侵入，侵略","unit":"B2U6","examples":[{"en":"The D-Day landings began on June 6, 1944
